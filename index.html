<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Specs - Comparador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.1; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .slot-active { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .loading { border: 2px solid #ffffff10; border-top: 2px solid #10b981; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[500px] h-[500px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[400px] h-[400px] bottom-0 right-0"></div>
    </div>

    <header class="max-w-7xl mx-auto text-center mb-12">
        <h1 class="text-4xl md:text-6xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent italic tracking-tighter uppercase">BATALHA DE SPECS</h1>
        <p class="text-emerald-500/60 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">Escolha até 4 aparelhos para duelar</p>
    </header>

    <main class="max-w-7xl mx-auto">
        
        <!-- GRID DE 4 SLOTS -->
        <div id="searchSection" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <!-- SLOT 1 -->
            <div class="glass p-6 rounded-[2.5rem] flex flex-col gap-4 border-white/10" id="slot-0">
                <span class="text-[9px] font-bold text-emerald-500/50 uppercase tracking-widest">Aparelho 1</span>
                <input type="text" placeholder="Ex: S24 Ultra" onchange="buscarNoSlot(0, this.value)" class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-xs outline-none focus:border-emerald-500 transition-all">
                <div id="result-0" class="flex flex-col gap-2 max-h-40 overflow-y-auto"></div>
            </div>
            <!-- SLOT 2 -->
            <div class="glass p-6 rounded-[2.5rem] flex flex-col gap-4 border-white/10" id="slot-1">
                <span class="text-[9px] font-bold text-emerald-500/50 uppercase tracking-widest">Aparelho 2</span>
                <input type="text" placeholder="Ex: iPhone 16" onchange="buscarNoSlot(1, this.value)" class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-xs outline-none focus:border-emerald-500 transition-all">
                <div id="result-1" class="flex flex-col gap-2 max-h-40 overflow-y-auto"></div>
            </div>
            <!-- SLOT 3 -->
            <div class="glass p-6 rounded-[2.5rem] flex flex-col gap-4 border-white/10" id="slot-2">
                <span class="text-[9px] font-bold text-emerald-500/50 uppercase tracking-widest">Aparelho 3</span>
                <input type="text" placeholder="Ex: Pixel 9" onchange="buscarNoSlot(2, this.value)" class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-xs outline-none focus:border-emerald-500 transition-all">
                <div id="result-2" class="flex flex-col gap-2 max-h-40 overflow-y-auto"></div>
            </div>
            <!-- SLOT 4 -->
            <div class="glass p-6 rounded-[2.5rem] flex flex-col gap-4 border-white/10" id="slot-3">
                <span class="text-[9px] font-bold text-emerald-500/50 uppercase tracking-widest">Aparelho 4</span>
                <input type="text" placeholder="Ex: Xiaomi 14" onchange="buscarNoSlot(3, this.value)" class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-xs outline-none focus:border-emerald-500 transition-all">
                <div id="result-3" class="flex flex-col gap-2 max-h-40 overflow-y-auto"></div>
            </div>
        </div>

        <!-- BOTÃO COMPARAÇÃO -->
        <div class="flex justify-center mb-20" id="btnContainer">
            <button onclick="iniciarBatalha()" id="battleBtn" disabled 
                class="bg-emerald-500 disabled:bg-white/5 disabled:text-white/20 text-black font-black px-16 py-5 rounded-full text-xs tracking-widest hover:scale-105 transition-all shadow-lg uppercase">
                Batalhar Agora
            </button>
        </div>

        <!-- TABELA FINAL -->
        <div id="battleArea" class="hidden opacity-0 transition-all duration-700 translate-y-10">
            <div class="glass rounded-[3rem] overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[800px]">
                        <thead id="tableHead" class="border-b border-white/10 bg-emerald-500/5"></thead>
                        <tbody id="tableBody" class="text-xs md:text-sm"></tbody>
                    </table>
                </div>
            </div>
            <div class="text-center mt-10 mb-20">
                <button onclick="location.reload()" class="text-emerald-500 text-[10px] font-bold uppercase underline">Reiniciar Duelo</button>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = '0adddb24fbmsh2289164deba91c5p1ff721jsn0d25d66220ff';
        const HOST = 'mobile-phone-specs-database.p.rapidapi.com';
        const slotsData = [null, null, null, null];

        async function buscarNoSlot(index, query) {
            if(!query || query.length < 2) return;
            const resDiv = document.getElementById(`result-${index}`);
            resDiv.innerHTML = '<div class="flex justify-center py-4"><div class="loading"></div></div>';

            try {
                const response = await fetch(`https://${HOST}/gsm/search-query/${query}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });

                if (response.status === 403) throw new Error("Acesso negado: Assine o plano Basic no RapidAPI.");
                if (!response.ok) throw new Error("Erro na busca");

                const data = await response.json();
                resDiv.innerHTML = '';

                data.slice(0, 5).forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = "text-left p-2 rounded-xl bg-white/5 text-[10px] hover:bg-emerald-500 hover:text-black transition-all truncate";
                    btn.innerText = item.device_name;
                    btn.onclick = () => selecionarCelular(index, item.slug, item.device_name);
                    resDiv.appendChild(btn);
                });
            } catch (err) {
                resDiv.innerHTML = `<p class="text-[8px] text-red-400 text-center">${err.message}</p>`;
                console.error(err);
            }
        }

        async function selecionarCelular(index, slug, name) {
            const slotEl = document.getElementById(`slot-${index}`);
            slotEl.style.opacity = "0.5";

            try {
                const res = await fetch(`https://${HOST}/gsm/get-specifications-by-slug/${slug}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });
                const specs = await res.json();
                
                slotsData[index] = specs;
                slotEl.style.opacity = "1";
                slotEl.classList.add('slot-active');
                slotEl.innerHTML = `
                    <span class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">Confirmado</span>
                    <p class="text-xs font-bold text-center py-4">${name}</p>
                    <button onclick="location.reload()" class="text-[8px] opacity-30">Trocar</button>
                `;
                
                // Habilitar botão se houver 2 ou mais
                const ativos = slotsData.filter(s => s !== null).length;
                document.getElementById('battleBtn').disabled = ativos < 2;
            } catch (e) {
                alert("Erro ao carregar especificações.");
            }
        }

        function iniciarBatalha() {
            document.getElementById('searchSection').classList.add('hidden');
            document.getElementById('btnContainer').classList.add('hidden');
            const area = document.getElementById('battleArea');
            area.classList.remove('hidden');
            setTimeout(() => { area.style.opacity = "1"; area.style.transform = "translateY(0)"; }, 50);

            const ativos = slotsData.filter(s => s !== null);
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            // Cabeçalho - Usando os nomes exatos do seu print (phoneDetails)
            head.innerHTML = `
                <tr>
                    <th class="p-6 text-emerald-500 text-[10px] font-black uppercase italic">Duelo Tech</th>
                    ${ativos.map(p => `<th class="p-6 text-center border-l border-white/5 font-bold uppercase text-sm">${p.phoneDetails?.modelValue || p.device_name}</th>`).join('')}
                </tr>
            `;

            // Mapeamento baseado no JSON que você mostrou na imagem
            const linhas = [
                { label: 'Marca', val: p => p.phoneDetails?.brandValue },
                { label: 'Lançamento', val: p => p.phoneDetails?.yearValue },
                { label: 'Rede', val: p => p.gsmNetworkDetails?.networkTechnology },
                { label: 'Processador', val: p => p.gsmPlatformDetails?.cpu },
                { label: 'Chipset', val: p => p.gsmPlatformDetails?.chipset },
                { label: 'Câmera Principal', val: p => p.gsmMainCameraDetails?.main_camera_single || p.gsmMainCameraDetails?.main_camera_triple },
                { label: 'Memória RAM/Int.', val: p => p.gsmMemoryDetails?.internal },
                { label: 'Bateria', val: p => p.gsmBatteryDetails?.battery_type },
                { label: 'Tela', val: p => p.gsmDisplayDetails?.display_type },
                { label: 'Resolução', val: p => p.gsmDisplayDetails?.display_resolution }
            ];

            body.innerHTML = linhas.map((l, i) => `
                <tr class="border-b border-white/5 ${i % 2 === 0 ? '' : 'bg-white/5'}">
                    <td class="p-5 text-emerald-500/80 font-bold text-[10px] uppercase">${l.label}</td>
                    ${ativos.map(p => `<td class="p-5 text-center border-l border-white/5 text-xs text-white/70">${l.val(p) || 'N/A'}</td>`).join('')}
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
