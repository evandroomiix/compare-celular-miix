<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Spec - Comparador Dinâmico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; scroll-behavior: smooth; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-selected { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; }
        /* Esconder scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #010c0a; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[500px] h-[500px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[400px] h-[400px] bottom-0 right-0"></div>
    </div>

    <!-- HEADER -->
    <header class="max-w-6xl mx-auto text-center mb-12">
        <h1 class="text-4xl md:text-6xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent mb-4">
            AURORA SPEC
        </h1>
        <p class="text-emerald-500/60 tracking-[0.2em] font-bold text-xs uppercase">Comparador de Celulares Inteligente</p>
    </header>

    <!-- ÁREA DE BUSCA E SELEÇÃO -->
    <section class="max-w-6xl mx-auto mb-16">
        <div class="glass p-6 md:p-10 rounded-[2.5rem] shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div>
                    <h2 class="text-2xl font-bold">Selecione os Aparelhos</h2>
                    <p class="text-white/40 text-sm">Escolha de 2 a 4 aparelhos para comparar</p>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-full px-6 py-3 flex items-center gap-3 w-full md:w-80 focus-within:border-emerald-500 transition-all">
                    <input type="text" id="searchInput" placeholder="Pesquisar modelo..." class="bg-transparent border-none outline-none w-full text-sm">
                </div>
            </div>

            <!-- GRID DE APARELHOS PARA SELECIONAR -->
            <div id="deviceGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 max-h-80 overflow-y-auto p-2">
                <!-- Os aparelhos vão aparecer aqui via JavaScript -->
            </div>

            <div class="mt-8 flex flex-col md:flex-row items-center justify-between gap-6 border-t border-white/10 pt-8">
                <div id="selectionStatus" class="text-sm font-medium text-emerald-400">
                    Nenhum selecionado (Mínimo 2)
                </div>
                <button id="compareBtn" disabled class="bg-emerald-500 disabled:bg-white/10 disabled:text-white/20 text-[#010c0a] px-10 py-4 rounded-full font-bold transition-all hover:scale-105 active:scale-95">
                    COMPARAR AGORA
                </button>
            </div>
        </div>
    </section>

    <!-- RESULTADO DA COMPARAÇÃO (INICIALMENTE OCULTO) -->
    <section id="comparisonSection" class="max-w-7xl mx-auto hidden transition-all duration-700">
        <div id="comparisonGrid" class="grid gap-6">
            <!-- Tabela gerada dinamicamente aqui -->
        </div>
    </section>

    <script>
        // BANCO DE DADOS DOS APARELHOS
        const allDevices = [
            { id: 1, brand: 'Samsung', name: 'Galaxy S24 Ultra', price: 'R$ 7.200', img: 'https://images.samsung.com/is/image/samsung/p6pim/br/2401/gallery/br-galaxy-s24-s928-sm-s928bztqzto-539358253?$650_519_PNG$', specs: ['6.8" AMOLED', 'Snapdragon 8 Gen 3', '12GB', '5000mAh', '200MP'] },
            { id: 2, brand: 'Apple', name: 'iPhone 15 Pro Max', price: 'R$ 8.900', img: 'https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-7inch-naturaltitanium?wid=5120&hei=2880&fmt=p-jpg&qlt=80&.v=1692845702708', specs: ['6.7" OLED', 'A17 Pro', '8GB', '4441mAh', '48MP'] },
            { id: 3, brand: 'Xiaomi', name: 'Xiaomi 14 Ultra', price: 'R$ 6.500', img: 'https://i02.appmifile.com/97_operator_sg/14/03/2024/7610630985c571738f615f5c78f1498b.png', specs: ['6.73" LTPO', 'Snapdragon 8 Gen 3', '16GB', '5000mAh', '50MP Leica'] },
            { id: 4, brand: 'Google', name: 'Pixel 8 Pro', price: 'R$ 5.800', img: 'https://lh3.googleusercontent.com/9499p91uWc9Xp_N-XkO-8O93S96_9f9v-O7o6_B_Y6-vV_T_A', specs: ['6.7" LTPO OLED', 'Tensor G3', '12GB', '5050mAh', '50MP'] },
            { id: 5, brand: 'Motorola', name: 'Edge 50 Pro', price: 'R$ 3.500', img: 'https://armatun.com/wp-content/uploads/2024/04/Motorola-Edge-50-Pro-5G-Luxe-Lavender-Front-Back.png', specs: ['6.7" OLED', 'Snapdragon 7 Gen 3', '12GB', '4500mAh', '50MP'] }
        ];

        let selectedIds = [];

        // FUNÇÃO PARA RENDERIZAR O GRID DE BUSCA
        function renderSearchGrid(filter = '') {
            const grid = document.getElementById('deviceGrid');
            grid.innerHTML = '';
            
            const filtered = allDevices.filter(d => d.name.toLowerCase().includes(filter.toLowerCase()));

            filtered.forEach(device => {
                const isSelected = selectedIds.includes(device.id);
                const card = document.createElement('div');
                card.className = `glass p-4 rounded-3xl cursor-pointer transition-all hover:scale-105 ${isSelected ? 'card-selected' : ''}`;
                card.innerHTML = `
                    <img src="${device.img}" class="h-24 mx-auto mb-2 object-contain">
                    <p class="text-[10px] text-emerald-400 font-bold uppercase">${device.brand}</p>
                    <p class="text-xs font-bold truncate">${device.name}</p>
                `;
                card.onclick = () => toggleSelect(device.id);
                grid.appendChild(card);
            });
        }

        // FUNÇÃO PARA SELECIONAR/DESELECIONAR
        function toggleSelect(id) {
            if (selectedIds.includes(id)) {
                selectedIds = selectedIds.filter(i => i !== id);
            } else {
                if (selectedIds.length < 4) {
                    selectedIds.push(id);
                } else {
                    alert("Limite de 4 aparelhos atingido!");
                }
            }
            updateUI();
        }

        function updateUI() {
            renderSearchGrid(document.getElementById('searchInput').value);
            const btn = document.getElementById('compareBtn');
            const status = document.getElementById('selectionStatus');
            
            status.innerText = `${selectedIds.length} aparelhos selecionados`;
            btn.disabled = selectedIds.length < 2;
        }

        // EVENTO DE BUSCA
        document.getElementById('searchInput').oninput = (e) => renderSearchGrid(e.target.value);

        // LÓGICA DE COMPARAÇÃO
        document.getElementById('compareBtn').onclick = () => {
            const section = document.getElementById('comparisonSection');
            const grid = document.getElementById('comparisonGrid');
            section.classList.remove('hidden');
            
            const selectedDevices = allDevices.filter(d => selectedIds.includes(d.id));
            
            // Gerar HTML da comparação
            let html = `
                <div class="glass p-8 rounded-[3rem] overflow-x-auto shadow-2xl">
                    <table class="w-full text-left min-w-[600px]">
                        <thead>
                            <tr>
                                <th class="p-4 text-emerald-500 uppercase text-xs">Especificações</th>
                                ${selectedDevices.map(d => `<th class="p-4 text-center border-l border-white/5 font-bold">${d.name}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody class="text-sm">
                            <tr class="border-t border-white/5"><td class="p-4 text-white/40">Preço Médio</td>${selectedDevices.map(d => `<td class="p-4 text-center border-l border-white/5 text-emerald-300 font-bold">${d.price}</td>`).join('')}</tr>
                            <tr class="border-t border-white/5 bg-white/5"><td class="p-4 text-white/40">Tela</td>${selectedDevices.map(d => `<td class="p-4 text-center border-l border-white/5">${d.specs[0]}</td>`).join('')}</tr>
                            <tr class="border-t border-white/5"><td class="p-4 text-white/40">Processador</td>${selectedDevices.map(d => `<td class="p-4 text-center border-l border-white/5">${d.specs[1]}</td>`).join('')}</tr>
                            <tr class="border-t border-white/5 bg-white/5"><td class="p-4 text-white/40">RAM</td>${selectedDevices.map(d => `<td class="p-4 text-center border-l border-white/5">${d.specs[2]}</td>`).join('')}</tr>
                            <tr class="border-t border-white/5"><td class="p-4 text-white/40">Bateria</td>${selectedDevices.map(d => `<td class="p-4 text-center border-l border-white/5">${d.specs[3]}</td>`).join('')}</tr>
                            <tr class="border-t border-white/5 bg-white/5"><td class="p-4 text-white/40">Câmera</td>${selectedDevices.map(d => `<td class="p-4 text-center border-l border-white/5">${d.specs[4]}</td>`).join('')}</tr>
                        </tbody>
                    </table>
                </div>
                <div class="text-center mt-8">
                    <button onclick="window.scrollTo(0,0)" class="text-emerald-500 text-sm font-bold underline">Voltar ao topo ↑</button>
                </div>
            `;
            
            grid.innerHTML = html;
            setTimeout(() => section.scrollIntoView({ behavior: 'smooth' }), 100);
        };

        // Inicializar
        renderSearchGrid();
    </script>
</body>
</html>
