<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Specs - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; overflow-x: hidden; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.12; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .slot-confirmed { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        
        /* Tabela Pro com Sidebar Fixa */
        .spec-sidebar { position: sticky; left: 0; background: #011511; z-index: 30; min-width: 140px; max-width: 180px; font-weight: 800; color: #10b981; font-size: 11px; text-transform: uppercase; border-right: 1px solid rgba(255, 255, 255, 0.1); padding: 15px !important; }
        .device-col { min-width: 200px; text-align: center; border-left: 1px solid rgba(255, 255, 255, 0.05); padding: 15px !important; vertical-align: middle; }
        .cat-header { background: rgba(16, 185, 129, 0.15); color: #10b981; font-weight: 900; font-size: 12px; letter-spacing: 2px; text-align: left; padding-left: 20px !important; }
        
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .loading { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #10b981; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tag-rumor { background: #f59e0b; color: black; font-size: 7px; padding: 2px 4px; border-radius: 3px; font-weight: 900; margin-left: 5px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[600px] h-[600px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[500px] h-[500px] bottom-0 right-0"></div>
    </div>

    <header class="max-w-7xl mx-auto text-center mb-10">
        <h1 class="text-4xl md:text-6xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent italic tracking-tighter uppercase">BATALHA DE SPECS</h1>
        <p class="text-emerald-500/60 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">Comparador Inteligente • Dados do Brasil</p>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="setupArea">
            <!-- 4 SLOTS DE BUSCA -->
            <div id="searchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                <script>
                    for(let i=0; i<4; i++) {
                        document.write(`
                            <div class="slot glass p-6 rounded-[2.5rem] flex flex-col items-center gap-4 border-white/5 transition-all relative" id="slot-${i}">
                                <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-widest">Aparelho 0${i+1}</span>
                                <input type="text" placeholder="Ex: S24 Ultra..." 
                                       id="input-${i}"
                                       oninput="debounceSearch(${i}, this.value)"
                                       class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-[11px] outline-none focus:border-emerald-500 transition-all uppercase">
                                <div id="result-${i}" class="w-full space-y-1 mt-2 max-h-56 overflow-y-auto z-50"></div>
                            </div>
                        `);
                    }
                </script>
            </div>

            <div class="flex justify-center mb-16">
                <button onclick="iniciarBatalha()" id="battleBtn" disabled class="bg-emerald-500 disabled:bg-white/5 disabled:text-white/20 text-black font-black px-16 py-5 rounded-full text-sm tracking-widest hover:scale-105 transition-all shadow-[0_0_30px_rgba(16,185,129,0.4)] uppercase">
                    Batalhar Agora
                </button>
            </div>
        </div>

        <!-- TABELA DE RESULTADO -->
        <div id="battleArea" class="hidden opacity-0 translate-y-10 transition-all duration-700">
            <div class="glass rounded-[3rem] overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead id="tableHead" class="bg-emerald-950/20"></thead>
                        <tbody id="tableBody" class="text-xs md:text-sm"></tbody>
                    </table>
                </div>
            </div>
            <div class="text-center mt-12 pb-20 flex justify-center gap-4 flex-wrap">
                <button onclick="voltar()" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 px-10 py-4 rounded-full text-xs font-bold uppercase hover:bg-emerald-500 hover:text-black transition-all">Voltar e Editar</button>
                <button onclick="location.reload()" class="bg-red-500/10 border border-red-500/20 text-red-500 px-10 py-4 rounded-full text-xs font-bold uppercase hover:bg-red-500 hover:text-white transition-all">Limpar Tudo</button>
            </div>
        </div>
    </main>

    <script>
        let phoneDatabase = [];
        
        // SUA CHAVE DA API E O ID DO DATASET
        const APIFY_TOKEN = 'apify_api_bs5O1ysnZJsu4tUmr8UvSMej3I4cmU3qB7yL';
        const DATASET_ID = '3tmXzuwcfKbhx9wWn'; // Seu Dataset ID real da Apify

        async function carregarBancoDeDados() {
            // Muda o texto dos campos enquanto baixa o arquivo do Apify
            for(let i=0; i<4; i++) {
                const input = document.getElementById(`input-${i}`);
                if(input) { input.placeholder = "Carregando celulares..."; input.disabled = true; }
            }

            try {
                const response = await fetch(`https://api.apify.com/v2/datasets/${DATASET_ID}/items?token=${APIFY_TOKEN}`);
                const data = await response.json();
                
                if(Array.isArray(data)) {
                    phoneDatabase = data;
                }
                
                // Libera os campos para pesquisa
                for(let i=0; i<4; i++) {
                    const input = document.getElementById(`input-${i}`);
                    if(input) { input.placeholder = `Buscar em ${phoneDatabase.length} modelos...`; input.disabled = false; }
                }
            } catch (error) {
                console.error("Erro ao puxar dados da Apify:", error);
                alert("Erro ao conectar com a Apify. Verifique se o DATASET_ID está correto.");
            }
        }
        
        // Inicia o download do dataset assim que o site abre
        carregarBancoDeDados();

        const slotsData = [null, null, null, null];
        let timers = [null, null, null, null];

        function debounceSearch(index, query) {
            clearTimeout(timers[index]);
            if (query.length < 2) { document.getElementById(`result-${index}`).innerHTML = ''; return; }
            timers[index] = setTimeout(() => buscar(index, query), 500);
        }

        function buscar(index, query) {
            const resDiv = document.getElementById(`result-${index}`);
            
            // Divide a busca em palavras separadas (ex: "samsung s23" vira ["SAMSUNG", "S23"])
            const termosBusca = query.toUpperCase().trim().split(/\s+/);
            
            // Busca Inteligente: Exige que todas as palavras digitadas estejam no nome
            const resultados = phoneDatabase.filter(d => {
                const textoAparelho = `${d.brand || ''} ${d.name || ''} ${d.model_name || ''}`.toUpperCase();
                return termosBusca.every(termo => textoAparelho.includes(termo));
            });

            resDiv.innerHTML = '';
            if (resultados.length === 0) {
                resDiv.innerHTML = '<p class="text-center text-xs text-white/40 p-3">Nenhum aparelho encontrado.</p>';
                return;
            }

            resultados.slice(0, 10).forEach(item => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 rounded-xl bg-white/5 text-[10px] font-bold hover:bg-emerald-500 hover:text-black transition-all border border-white/5 mb-1 flex justify-between items-center uppercase truncate";
                const nomeExibir = `${item.brand || ''} ${item.name || item.model_name || ''}`.trim();
                const isRumor = item.status && item.status.toLowerCase() === 'rumored';
                btn.innerHTML = `<span>${nomeExibir}</span> ${isRumor ? '<span class="tag-rumor">RUMOR</span>' : ''}`;
                btn.onclick = () => selecionar(index, item);
                resDiv.appendChild(btn);
            });
        }

        function selecionar(index, item) {
            const slotEl = document.getElementById(`slot-${index}`);
            slotsData[index] = item; // O objeto inteiro do nosso banco de dados já tem tudo!

            slotEl.classList.add('slot-confirmed');
            slotEl.innerHTML = `
                <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center mb-2"><svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg></div>
                <p class="text-[10px] font-black text-center uppercase tracking-tighter">${item.brand || ''} ${item.name || item.model_name || ''}</p>
                <button onclick="remover(${index})" class="mt-4 text-[9px] font-bold text-red-400 opacity-60 hover:opacity-100 uppercase transition-all">Remover</button>
            `;
            document.getElementById('battleBtn').disabled = slotsData.filter(s => s !== null).length < 2;
        }

        function remover(index) {
            slotsData[index] = null;
            const slotEl = document.getElementById(`slot-${index}`);
            slotEl.classList.remove('slot-confirmed');
            slotEl.innerHTML = `
                <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-widest">Aparelho 0${index+1}</span>
                <input type="text" placeholder="Buscar em ${phoneDatabase.length} modelos..." 
                       id="input-${index}"
                       oninput="debounceSearch(${index}, this.value)"
                       class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-[11px] outline-none focus:border-emerald-500 transition-all uppercase">
                <div id="result-${index}" class="w-full space-y-1 mt-2 max-h-56 overflow-y-auto z-50"></div>
            `;
            document.getElementById('battleBtn').disabled = slotsData.filter(s => s !== null).length < 2;
        }

        function voltar() {
            const area = document.getElementById('battleArea');
            area.style.opacity = "0"; 
            area.style.transform = "translateY(10px)";
            setTimeout(() => { 
                area.classList.add('hidden');
                document.getElementById('setupArea').classList.remove('hidden');
            }, 700);
        }

        function iniciarBatalha() {
            document.getElementById('setupArea').classList.add('hidden');
            const area = document.getElementById('battleArea');
            area.classList.remove('hidden');
            setTimeout(() => { area.style.opacity = "1"; area.style.transform = "translateY(0)"; }, 50);

            const ativos = slotsData.filter(s => s !== null);
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            head.innerHTML = `
                <tr>
                    <th class="p-5 spec-sidebar">Ficha Técnica</th>
                    ${ativos.map(p => `<th class="p-5 device-col font-black text-xs uppercase text-emerald-400">${p.brand || ''}<br><span class="text-white text-sm">${p.name || 'Smartphone'}</span></th>`).join('')}
                </tr>
            `;

            const rows = [
                { cat: '📱 DESIGN E CORPO' },
                { label: 'Dimensões', val: p => p.body_dimensions || p.dimensions || '-' },
                { label: 'Peso', val: p => p.body_weight || p.weight || '-' },
                { label: 'Construção', val: p => p.body_build || p.build || '-' },
                { label: 'Chips (SIM)', val: p => p.body_sim || p.sim || '-' },
                
                { cat: '🖥️ TELA' },
                { label: 'Tipo', val: p => p.display_type || p.displaytype || '-' },
                { label: 'Tamanho', val: p => p.display_size || p.displaysize || '-' },
                { label: 'Resolução', val: p => p.display_resolution || p.displayresolution || '-' },
                { label: 'Proteção', val: p => p.display_protection || p.displayprotection || '-' },

                { cat: '⚙️ PLATAFORMA (HARDWARE)' },
                { label: 'Sistema (OS)', val: p => p.platform_os || p.os || '-' },
                { label: 'Processador (CPU)', val: p => p.platform_cpu || p.cpu || '-' },
                { label: 'Chipset', val: p => p.platform_chipset || p.chipset || '-' },
                { label: 'GPU', val: p => p.platform_gpu || p.gpu || '-' },

                { cat: '💾 MEMÓRIA' },
                { label: 'Interna (RAM e ROM)', val: p => p.memory_internal || p.internalmemory || '-' },
                { label: 'Cartão de Memória', val: p => p.memory_card_slot || p.memoryslot || '-' },

                { cat: '📸 CÂMERA PRINCIPAL' },
                { label: 'Sensores', val: p => p.main_camera_quad || p.main_camera_triple || p.main_camera_dual || p.main_camera_single || p.cam1modules || '-' },
                { label: 'Recursos', val: p => p.main_camera_features || p.cam1features || '-' },
                { label: 'Vídeo', val: p => p.main_camera_video || p.cam1video || '-' },

                { cat: '🤳 CÂMERA FRONTAL' },
                { label: 'Sensores', val: p => p.selfie_camera_single || p.selfie_camera_dual || p.cam2modules || '-' },
                { label: 'Vídeo', val: p => p.selfie_camera_video || p.cam2video || '-' },

                { cat: '🔊 ÁUDIO E CONEXÕES' },
                { label: 'Alto-falantes', val: p => p.sound_loudspeaker || '-' },
                { label: 'Wi-Fi', val: p => p.comms_wlan || p.wlan || '-' },
                { label: 'Bluetooth', val: p => p.comms_bluetooth || p.bluetooth || '-' },
                { label: 'GPS', val: p => p.comms_positioning || p.gps || '-' },
                { label: 'NFC', val: p => p.comms_nfc || p.nfc || '-' },
                { label: 'USB', val: p => p.comms_usb || p.usb || '-' },

                { cat: '🔋 BATERIA E EXTRAS' },
                { label: 'Sensores', val: p => p.features_sensors || p.sensors || '-' },
                { label: 'Capacidade', val: p => p.battery_type || p.batdescription1 || '-' },
                { label: 'Carregamento', val: p => p.battery_charging || '-' }
            ];

            body.innerHTML = rows.map(r => {
                if(r.cat) return `<tr class="cat-header"><td colspan="${ativos.length + 1}" class="p-3 uppercase tracking-widest text-emerald-300 font-extrabold bg-emerald-900/40">${r.cat}</td></tr>`;
                return `<tr class="border-b border-white/5 hover:bg-white/[0.03] transition-colors">
                    <td class="p-4 spec-sidebar text-white/60 font-bold">${r.label}</td>
                    ${ativos.map(p => `<td class="p-4 device-col text-[11px] text-white/90 leading-relaxed">${r.val(p) || '-'}</td>`).join('')}
                </tr>`;
            }).join('');
        }
    </script>
</body>
</html>
