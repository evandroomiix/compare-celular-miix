<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Specs - O Duelo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; overflow-x: hidden; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.12; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .selected-slot { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .loading-spinner { border: 2px solid #ffffff10; border-top: 2px solid #10b981; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[500px] h-[500px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[400px] h-[400px] bottom-0 right-0"></div>
    </div>

    <header class="max-w-7xl mx-auto text-center mb-12">
        <h1 class="text-4xl md:text-6xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent italic tracking-tighter uppercase">BATALHA DE SPECS</h1>
        <p class="text-emerald-500/60 text-[10px] font-bold tracking-[0.4em] uppercase mt-2 text-center">Compare até 4 aparelhos em tempo real</p>
    </header>

    <main class="max-w-7xl mx-auto">
        
        <!-- GRID DE 4 COLUNAS FIXAS -->
        <div id="setupArea">
            <div id="searchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-12">
                <!-- Gerando 4 slots -->
                <script>
                    for(let i=0; i<4; i++) {
                        document.write(`
                            <div class="slot glass p-6 rounded-[2.5rem] flex flex-col items-center gap-4 transition-all border-white/5" id="slot-${i}">
                                <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-[0.2em]">Slot 0${i+1}</span>
                                <div class="w-full relative">
                                    <input type="text" placeholder="Nome do celular..." 
                                           onkeyup="if(event.key==='Enter') searchInSlot(${i}, this.value)"
                                           class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-xs outline-none focus:border-emerald-500 transition-all">
                                    <button onclick="searchInSlot(${i}, this.previousElementSibling.value)" class="absolute right-3 top-2.5 text-emerald-500 text-xs font-bold hover:text-white">Ir</button>
                                </div>
                                <div id="result-${i}" class="w-full min-h-[50px] space-y-2 overflow-y-auto max-h-48 scrollbar-hide"></div>
                            </div>
                        `);
                    }
                </script>
            </div>

            <!-- BOTÃO BATALHAR -->
            <div class="flex justify-center mb-20">
                <button onclick="startBattle()" id="battleBtn" disabled 
                        class="bg-emerald-500 disabled:bg-white/5 disabled:text-white/20 text-black font-black px-16 py-5 rounded-full text-sm tracking-widest hover:scale-105 transition-all shadow-[0_0_30px_rgba(16,185,129,0.3)] uppercase">
                    Batalhar!
                </button>
            </div>
        </div>

        <!-- TABELA DE RESULTADO (INICIALMENTE ESCONDIDA) -->
        <div id="battleArea" class="hidden opacity-0 translate-y-10 transition-all duration-700">
            <div class="glass rounded-[3rem] overflow-hidden shadow-2xl">
                <div class="table-container overflow-x-auto">
                    <table class="w-full text-left min-w-[800px]">
                        <thead id="tableHead" class="border-b border-white/10 bg-emerald-500/5"></thead>
                        <tbody id="tableBody" class="text-xs md:text-sm"></tbody>
                    </table>
                </div>
            </div>
            <div class="text-center mt-12 mb-20">
                <button onclick="location.reload()" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-emerald-500 hover:text-black transition-all">Nova Comparação</button>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = '0adddb24fbmsh2289164deba91c5p1ff721jsn0d25d66220ff';
        const HOST = 'mobile-phone-specs-database.p.rapidapi.com';
        const slots = [null, null, null, null];

        async function searchInSlot(index, query) {
            if(!query || query.length < 2) return;
            const resultDiv = document.getElementById(`result-${index}`);
            resultDiv.innerHTML = '<div class="flex justify-center py-4"><div class="loading-spinner"></div></div>';

            try {
                const response = await fetch(`https://${HOST}/gsm/search-query/${query}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });
                
                const data = await response.json();
                resultDiv.innerHTML = '';
                
                if(!data || data.length === 0) {
                    resultDiv.innerHTML = '<p class="text-[9px] text-center opacity-40">Nada encontrado</p>';
                    return;
                }

                data.slice(0, 5).forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-3 rounded-2xl bg-white/5 text-[10px] font-semibold hover:bg-emerald-500 hover:text-black transition-all truncate border border-white/5";
                    btn.innerText = item.device_name;
                    btn.onclick = () => selectForSlot(index, item.slug, item.device_name);
                    resultDiv.appendChild(btn);
                });
            } catch (err) {
                resultDiv.innerHTML = '<p class="text-[8px] text-red-400 text-center">Erro de conexão</p>';
            }
        }

        async function selectForSlot(index, slug, name) {
            const slotEl = document.getElementById(`slot-${index}`);
            const resultDiv = document.getElementById(`result-${index}`);
            resultDiv.innerHTML = '<div class="flex justify-center py-4"><div class="loading-spinner"></div></div>';

            try {
                const res = await fetch(`https://${HOST}/gsm/get-specifications-by-slug/${slug}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });
                const specs = await res.json();
                
                // Mapeando os dados conforme o padrão da API que você mostrou no print
                slots[index] = specs;
                
                slotEl.classList.add('selected-slot');
                slotEl.innerHTML = `
                    <div class="w-12 h-12 bg-emerald-500/20 rounded-full flex items-center justify-center mb-2">
                        <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <p class="text-xs font-bold text-center leading-tight uppercase tracking-tighter">${name}</p>
                    <button onclick="location.reload()" class="mt-4 text-[9px] font-bold text-white/30 hover:text-red-400 uppercase tracking-widest">Trocar</button>
                `;
                checkBattleReady();
            } catch(e) { 
                resultDiv.innerHTML = '<p class="text-[8px] text-red-400 text-center">Erro ao carregar detalhes</p>';
            }
        }

        function checkBattleReady() {
            const count = slots.filter(s => s !== null).length;
            document.getElementById('battleBtn').disabled = count < 2;
        }

        function startBattle() {
            const selectedDevices = slots.filter(s => s !== null);
            document.getElementById('setupArea').classList.add('hidden');
            
            const area = document.getElementById('battleArea');
            area.classList.remove('hidden');
            setTimeout(() => { area.style.opacity = "1"; area.style.transform = "translateY(0)"; }, 100);

            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            // Cabeçalho com os nomes dos aparelhos selecionados
            head.innerHTML = `
                <tr>
                    <th class="p-6 text-emerald-400 text-[10px] font-black uppercase tracking-[0.2em] italic">Atributo</th>
                    ${selectedDevices.map(p => `
                        <th class="p-6 text-center border-l border-white/5">
                            <span class="block text-emerald-400 text-[9px] uppercase mb-1">${p.phoneDetails?.brandValue || ''}</span>
                            <span class="font-black text-sm uppercase leading-none">${p.phoneDetails?.modelValue || p.device_name}</span>
                        </th>
                    `).join('')}
                </tr>
            `;

            // Linhas da tabela (Baseado na estrutura real da API)
            const specsMap = [
                { label: 'Lançamento', val: p => p.phoneDetails?.yearValue },
                { label: 'Processador (CPU)', val: p => p.gsmPlatformDetails?.cpu },
                { label: 'Chipset', val: p => p.gsmPlatformDetails?.chipset },
                { label: 'Memória Interna', val: p => p.gsmMemoryDetails?.internal },
                { label: 'Câmera Principal', val: p => p.gsmMainCameraDetails?.main_camera_single || p.gsmMainCameraDetails?.main_camera_triple },
                { label: 'Bateria', val: p => p.gsmBatteryDetails?.battery_type },
                { label: 'Tela', val: p => p.gsmDisplayDetails?.display_type },
                { label: 'Resolução', val: p => p.gsmDisplayDetails?.display_resolution },
                { label: 'Sistema Original', val: p => p.gsmPlatformDetails?.os }
            ];

            body.innerHTML = specsMap.map((spec, i) => `
                <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                    <td class="p-5 text-emerald-500/70 font-bold text-[10px] uppercase bg-emerald-500/5">${spec.label}</td>
                    ${selectedDevices.map(p => `<td class="p-5 text-center border-l border-white/5 font-light text-xs text-white/80">${spec.val(p) || 'N/A'}</td>`).join('')}
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
