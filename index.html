<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Tech - Comparador de Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; overflow-x: hidden; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Estilo da Tabela Profissional */
        .table-container { border-radius: 2rem; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
        .spec-label { position: sticky; left: 0; background: #011a14; z-index: 10; min-width: 140px; font-weight: 800; color: #10b981; font-size: 10px; text-transform: uppercase; }
        .device-col { min-width: 200px; text-align: center; border-left: 1px solid rgba(255, 255, 255, 0.05); }
        
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .loading-spin { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #10b981; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[600px] h-[600px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[500px] h-[500px] bottom-0 right-0"></div>
    </div>

    <header class="max-w-7xl mx-auto text-center mb-12">
        <h1 class="text-5xl md:text-7xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent italic tracking-tighter uppercase">BATALHA TECH</h1>
        <p id="statusInfo" class="text-emerald-500/60 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">Carregando banco de dados Apify...</p>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="setupArea">
            <!-- 4 SLOTS DE BUSCA -->
            <div id="searchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                <script>
                    for(let i=0; i<4; i++) {
                        document.write(`
                            <div class="slot glass p-6 rounded-[2.5rem] flex flex-col items-center gap-4 transition-all relative" id="slot-${i}">
                                <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-widest uppercase">Slot ${i+1}</span>
                                <input type="text" placeholder="Buscar celular..." 
                                       oninput="filtrarAparelhos(${i}, this.value)"
                                       class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-[11px] outline-none focus:border-emerald-500 transition-all uppercase">
                                <div id="result-${i}" class="w-full space-y-1 mt-2 max-h-48 overflow-y-auto"></div>
                            </div>
                        `);
                    }
                </script>
            </div>

            <div class="flex justify-center mb-16">
                <button onclick="iniciarDuelo()" id="battleBtn" disabled class="bg-emerald-500 disabled:bg-white/5 disabled:text-white/20 text-black font-black px-16 py-5 rounded-full text-sm tracking-widest hover:scale-105 transition-all shadow-[0_0_30px_rgba(16,185,129,0.3)] uppercase">
                    Iniciar Batalha
                </button>
            </div>
        </div>

        <!-- AREA DA TABELA (RESULTADO) -->
        <div id="battleArea" class="hidden opacity-0 translate-y-10 transition-all duration-700">
            <div class="table-container glass shadow-2xl overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="text-center mt-12 pb-20">
                <button onclick="location.reload()" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 px-10 py-4 rounded-full text-xs font-bold uppercase hover:bg-emerald-500 hover:text-black transition-all">Nova Comparação</button>
            </div>
        </div>
    </main>

    <script>
        // LINK DO SEU DATASET DO APIFY
        const DATASET_URL = 'https://api.apify.com/v2/datasets/2GJiVu6yOOFt35478/items?token=apify_api_bs5O1ysnZJsu4tUmr8UvSMej3I4cmU3qB7yL';
        
        let database = [];
        const selecionados = [null, null, null, null];

        // Carregar dados na abertura do site
        window.onload = async () => {
            try {
                const response = await fetch(DATASET_URL);
                database = await response.json();
                document.getElementById('statusInfo').innerText = `${database.length} APARELHOS SINCRONIZADOS COM APIFY`;
            } catch (e) {
                document.getElementById('statusInfo').innerText = "ERRO AO SINCRONIZAR. VERIFIQUE SEU TOKEN.";
            }
        };

        function filtrarAparelhos(index, query) {
            const resDiv = document.getElementById(`result-${index}`);
            if (query.length < 2) { resDiv.innerHTML = ''; return; }

            const busca = query.toLowerCase();
            const filtrados = database.filter(d => 
                (d.phone_model || d.name || "").toLowerCase().includes(busca) || 
                (d.brand_name || d.brand || "").toLowerCase().includes(busca)
            );

            resDiv.innerHTML = '';
            filtrados.slice(0, 10).forEach(item => {
                const name = item.phone_model || item.name || "Desconhecido";
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 rounded-xl bg-white/5 text-[10px] font-semibold hover:bg-emerald-500 hover:text-black transition-all border border-white/5 mb-1 uppercase";
                btn.innerText = name;
                btn.onclick = () => fixarSlot(index, item);
                resDiv.appendChild(btn);
            });
        }

        function fixarSlot(index, item) {
            const slotEl = document.getElementById(`slot-${index}`);
            selecionados[index] = item;
            
            const name = item.phone_model || item.name;
            const img = item.image_url || item.thumbnail || "";

            slotEl.classList.add('slot-confirmed');
            slotEl.innerHTML = `
                <div class="h-28 flex items-center justify-center mb-2">
                    ${img ? `<img src="${img}" class="h-full object-contain drop-shadow-2xl">` : `<div class="text-4xl">📱</div>`}
                </div>
                <p class="text-[10px] font-bold text-center uppercase italic leading-tight">${name}</p>
                <button onclick="location.reload()" class="mt-4 text-[8px] font-bold text-red-500 uppercase tracking-widest">Remover</button>
            `;
            
            const count = selecionados.filter(s => s !== null).length;
            document.getElementById('battleBtn').disabled = count < 2;
        }

        function iniciarDuelo() {
            document.getElementById('setupArea').classList.add('hidden');
            const area = document.getElementById('battleArea');
            area.classList.remove('hidden');
            setTimeout(() => { area.style.opacity = "1"; area.style.transform = "translateY(0)"; }, 100);

            const ativos = selecionados.filter(s => s !== null);
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            // CABEÇALHO (Imagens e Nomes)
            head.innerHTML = `
                <tr class="bg-emerald-500/10">
                    <th class="p-6 spec-label border-b border-white/10">Especificação</th>
                    ${ativos.map(p => `
                        <th class="p-6 device-col border-b border-white/10">
                            <img src="${p.image_url || p.thumbnail || ''}" class="h-20 mx-auto mb-2 object-contain">
                            <span class="block font-black text-sm uppercase leading-none text-emerald-400">${p.phone_model || p.name}</span>
                        </th>
                    `).join('')}
                </tr>
            `;

            // MAPEAMENTO DE DADOS DO APIFY (Extrai as chaves comuns)
            const specs = [
                { label: 'Processador', key: 'cpu' },
                { label: 'Chipset', key: 'chipset' },
                { label: 'Memória RAM', key: 'ram' },
                { label: 'Bateria', key: 'battery' },
                { label: 'Câmera Principal', key: 'camera_main' },
                { label: 'Câmera Frontal', key: 'camera_selfie' },
                { label: 'Display (Tela)', key: 'display_size' },
                { label: 'Resolução', key: 'display_resolution' },
                { label: 'Sistema (OS)', key: 'os' },
                { label: 'Dimensões', key: 'dimensions' },
                { label: 'Ano Lançamento', key: 'release_date' }
            ];

            body.innerHTML = specs.map((s, i) => `
                <tr class="border-b border-white/5 hover:bg-white/[0.02]">
                    <td class="p-4 spec-label border-r border-white/5">${s.label}</td>
                    ${ativos.map(p => `
                        <td class="p-4 device-col text-[11px] font-medium text-white/80">
                            ${p[s.key] || p.specifications?.find(cat => cat.title === s.label)?.specs?.[0]?.val?.[0] || 'N/D'}
                        </td>
                    `).join('')}
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
