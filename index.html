<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Tech - O Comparador Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; overflow-x: hidden; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .slot-confirmed { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        
        /* Tabela Profissional com Lateral Fixa */
        .spec-label { position: sticky; left: 0; background: #011a14; z-index: 10; min-width: 130px; font-weight: 800; color: #10b981; font-size: 9px; text-transform: uppercase; border-right: 1px solid rgba(255, 255, 255, 0.1); }
        .device-col { min-width: 180px; text-align: center; border-left: 1px solid rgba(255, 255, 255, 0.05); }
        
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .tag-rumor { background: #f59e0b; color: black; font-size: 7px; padding: 2px 4px; border-radius: 3px; font-weight: 900; margin-left: 5px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[600px] h-[600px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[500px] h-[500px] bottom-0 right-0"></div>
    </div>

    <header class="max-w-7xl mx-auto text-center mb-10">
        <h1 class="text-5xl md:text-7xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent italic tracking-tighter uppercase">BATALHA TECH</h1>
        <p class="text-emerald-500/60 text-[10px] font-bold tracking-[0.3em] uppercase mt-2">Dados Premium + Rumores S25 e S26</p>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="setupArea">
            <div id="searchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                <script>
                    for(let i=0; i<4; i++) {
                        document.write(`
                            <div class="slot glass p-6 rounded-[2.5rem] flex flex-col items-center gap-4 border-white/5 transition-all relative" id="slot-${i}">
                                <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-widest">Aparelho 0${i+1}</span>
                                <input type="text" placeholder="Busque S24, iPhone, S25..." 
                                       oninput="buscarAparelhos(${i}, this.value)"
                                       class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-[11px] outline-none focus:border-emerald-500 transition-all uppercase">
                                <div id="result-${i}" class="w-full space-y-1 mt-2 max-h-48 overflow-y-auto"></div>
                            </div>
                        `);
                    }
                </script>
            </div>

            <div class="flex justify-center mb-16">
                <button onclick="iniciarDuelo()" id="battleBtn" disabled class="bg-emerald-500 disabled:bg-white/5 disabled:text-white/20 text-black font-black px-16 py-5 rounded-full text-sm tracking-widest hover:scale-105 transition-all shadow-[0_0_30px_rgba(16,185,129,0.3)] uppercase">
                    Iniciar Batalha
                </button>
            </div>
        </div>

        <!-- RESULTADO -->
        <div id="battleArea" class="hidden opacity-0 translate-y-10 transition-all duration-700">
            <div class="glass rounded-[3rem] overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="text-center mt-12 pb-20">
                <button onclick="location.reload()" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 px-10 py-4 rounded-full text-xs font-bold uppercase hover:bg-emerald-500 hover:text-black transition-all">Nova Batalha</button>
            </div>
        </div>
    </main>

    <script>
        // BANCO LOCAL DE CELULARES (Sempre disponível)
        const dbLocal = [
            { phone_model: "Galaxy S24 Ultra", brand_name: "Samsung", price: "R$ 6.900", cpu: "Snapdragon 8 Gen 3", ram: "12GB RAM", battery: "5000 mAh", display_size: "6.8\"", camera_main: "200MP", image_url: "https://images.samsung.com/is/image/samsung/p6pim/br/2401/gallery/br-galaxy-s24-s928-sm-s928bztqzto-539358253" },
            { phone_model: "Galaxy S25 Ultra", brand_name: "Samsung", rumor: true, price: "Rumor", cpu: "Snapdragon 8 Gen 4", ram: "16GB RAM", battery: "5500 mAh", display_size: "6.9\"", camera_main: "200MP (Novo)", image_url: "https://cdn.dooca.store/107/products/s24-ultra-titanium-gray-01_1000x1000+fill_ffffff.png" },
            { phone_model: "iPhone 16 Pro Max", brand_name: "Apple", price: "R$ 9.500", cpu: "A18 Pro", ram: "8GB RAM", battery: "4676 mAh", display_size: "6.9\"", camera_main: "48MP + 48MP", image_url: "https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-16-pro-finish-select-202409-6-9inch-naturaltitanium?wid=5120&hei=2880&fmt=p-jpg" },
            { phone_model: "iPhone 15 Pro Max", brand_name: "Apple", price: "R$ 7.200", cpu: "A17 Pro", ram: "8GB RAM", battery: "4441 mAh", display_size: "6.7\"", camera_main: "48MP + 12MP", image_url: "https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-7inch-naturaltitanium?wid=5120&hei=2880&fmt=p-jpg" },
            { phone_model: "Galaxy S25 FE", brand_name: "Samsung", rumor: true, price: "Rumor", cpu: "Exynos 2500", ram: "8GB RAM", battery: "4800 mAh", display_size: "6.7\"", camera_main: "50MP", image_url: "" },
            { phone_model: "Galaxy S26 Ultra", brand_name: "Samsung", rumor: true, price: "Rumor 2026", cpu: "Snapdragon 8 Gen 5", ram: "24GB RAM", battery: "6000 mAh", display_size: "7.0\"", camera_main: "300MP", image_url: "" }
        ];

        let dbApify = [];
        const selecionados = [null, null, null, null];

        // Carrega o seu Dataset do Apify em segundo plano
        window.onload = async () => {
            try {
                const res = await fetch('https://api.apify.com/v2/datasets/2GJiVu6yOOFt35478/items?token=apify_api_bs5O1ysnZJsu4tUmr8UvSMej3I4cmU3qB7yL');
                dbApify = await res.json();
            } catch (e) { console.log("Apify offline, usando banco local."); }
        };

        function buscarAparelhos(index, query) {
            const resDiv = document.getElementById(`result-${index}`);
            if (query.length < 1) { resDiv.innerHTML = ''; return; }

            const busca = query.toLowerCase();
            // Une os dois bancos para a pesquisa
            const tudo = [...dbLocal, ...dbApify];
            const filtrados = tudo.filter(d => 
                (d.phone_model || d.name || "").toLowerCase().includes(busca)
            );

            resDiv.innerHTML = '';
            filtrados.slice(0, 10).forEach(item => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 rounded-xl bg-white/5 text-[10px] font-semibold hover:bg-emerald-500 hover:text-black transition-all border border-white/5 mb-1 flex justify-between items-center uppercase";
                btn.innerHTML = `<span>${item.phone_model || item.name}</span> ${item.rumor ? '<span class="tag-rumor">RUMOR</span>' : ''}`;
                btn.onclick = () => fixarSlot(index, item);
                resDiv.appendChild(btn);
            });
        }

        function fixarSlot(index, item) {
            const slotEl = document.getElementById(`slot-${index}`);
            selecionados[index] = item;
            
            const name = item.phone_model || item.name;
            const img = item.image_url || item.thumbnail || "";

            slotEl.classList.add('slot-confirmed');
            slotEl.innerHTML = `
                <div class="h-24 flex items-center justify-center mb-2">
                    ${img ? `<img src="${img}" class="h-full object-contain drop-shadow-2xl">` : `<div class="text-3xl">📱</div>`}
                </div>
                <p class="text-[10px] font-bold text-center uppercase italic leading-tight">${name}</p>
                <button onclick="location.reload()" class="mt-4 text-[8px] font-bold text-red-400 uppercase tracking-widest">Remover</button>
            `;
            
            const count = selecionados.filter(s => s !== null).length;
            document.getElementById('battleBtn').disabled = count < 2;
        }

        function iniciarDuelo() {
            document.getElementById('setupArea').classList.add('hidden');
            const area = document.getElementById('battleArea');
            area.classList.remove('hidden');
            setTimeout(() => { area.style.opacity = "1"; area.style.transform = "translateY(0)"; }, 100);

            const ativos = selecionados.filter(s => s !== null);
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            head.innerHTML = `
                <tr class="bg-emerald-500/10">
                    <th class="p-6 spec-label border-b border-white/10">Especificação</th>
                    ${ativos.map(p => `
                        <th class="p-6 device-col border-b border-white/10">
                            <img src="${p.image_url || p.thumbnail || ''}" class="h-20 mx-auto mb-2 object-contain">
                            <span class="block font-black text-[11px] uppercase leading-none text-emerald-400">${p.phone_model || p.name}</span>
                        </th>
                    `).join('')}
                </tr>
            `;

            const specs = [
                { label: 'Preço Médio', key: 'price' },
                { label: 'Processador', key: 'cpu' },
                { label: 'Memória RAM', key: 'ram' },
                { label: 'Bateria', key: 'battery' },
                { label: 'Câmera Principal', key: 'camera_main' },
                { label: 'Display (Tela)', key: 'display_size' },
                { label: 'Chipset', key: 'chipset' }
            ];

            body.innerHTML = specs.map(s => `
                <tr class="border-b border-white/5 hover:bg-white/[0.02]">
                    <td class="p-4 spec-label">${s.label}</td>
                    ${ativos.map(p => `
                        <td class="p-4 device-col text-[11px] font-medium text-white/80">
                            ${p[s.key] || 'Consultar'}
                        </td>
                    `).join('')}
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
