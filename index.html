<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Specs - Comparador Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; overflow-x: hidden; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.12; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .slot-confirmed { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; }
        .loading-spin { border: 2px solid #ffffff10; border-top: 2px solid #10b981; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[500px] h-[500px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[400px] h-[400px] bottom-0 right-0"></div>
    </div>

    <header class="max-w-7xl mx-auto text-center mb-10">
        <h1 class="text-4xl md:text-6xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent italic tracking-tighter uppercase">BATALHA DE SPECS</h1>
        <p class="text-emerald-500/60 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">Duelo de Titãs em Tempo Real</p>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="setupArea">
            <!-- 4 COLUNAS FIXAS -->
            <div id="searchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                <script>
                    for(let i=0; i<4; i++) {
                        document.write(`
                            <div class="slot glass p-6 rounded-[2.5rem] flex flex-col items-center gap-4 border-white/5" id="slot-${i}">
                                <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-widest">Aparelho 0${i+1}</span>
                                <input type="text" placeholder="Nome do celular..." 
                                       onchange="buscarNoSlot(${i}, this.value)"
                                       class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-xs outline-none focus:border-emerald-500 transition-all">
                                <div id="result-${i}" class="w-full space-y-1 max-h-40 overflow-y-auto"></div>
                            </div>
                        `);
                    }
                </script>
            </div>

            <div class="flex justify-center mb-16">
                <button onclick="iniciarBatalha()" id="battleBtn" disabled class="bg-emerald-500 disabled:bg-white/5 disabled:text-white/20 text-black font-black px-16 py-5 rounded-full text-sm tracking-widest hover:scale-105 transition-all shadow-lg uppercase">
                    Batalhar Agora
                </button>
            </div>
        </div>

        <div id="battleArea" class="hidden opacity-0 translate-y-10 transition-all duration-700">
            <div class="glass rounded-[3rem] overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[800px]">
                        <thead id="tableHead" class="border-b border-white/10 bg-emerald-500/5 text-sm uppercase"></thead>
                        <tbody id="tableBody" class="text-xs md:text-sm"></tbody>
                    </table>
                </div>
            </div>
            <div class="text-center mt-12 pb-20">
                <button onclick="location.reload()" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 px-10 py-4 rounded-full text-xs font-bold uppercase hover:bg-emerald-500 hover:text-black transition-all">Nova Batalha</button>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = '0adddb24fbmsh2289164deba91c5p1ff721jsn0d25d66220ff';
        const HOST = 'mobile-phone-specs-database.p.rapidapi.com';
        const slots = [null, null, null, null];

        async function buscarNoSlot(index, query) {
            if(!query) return;
            const resDiv = document.getElementById(`result-${index}`);
            resDiv.innerHTML = '<div class="flex justify-center py-4"><div class="loading-spin"></div></div>';

            try {
                const response = await fetch(`https://${HOST}/v2/mobile-phone-specs-database/search-query?query=${query}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });
                
                const data = await response.json();
                resDiv.innerHTML = '';

                data.slice(0, 5).forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-3 rounded-2xl bg-white/5 text-[10px] font-semibold hover:bg-emerald-500 hover:text-black transition-all border border-white/5 mb-1 truncate uppercase";
                    btn.innerText = item.device_name;
                    btn.onclick = () => selecionarParaSlot(index, item.custom_id, item.device_name);
                    resDiv.appendChild(btn);
                });
            } catch (err) {
                resDiv.innerHTML = '<p class="text-[9px] text-red-400 text-center">Falha na busca. Use a Vercel!</p>';
            }
        }

        async function selecionarParaSlot(index, id, name) {
            const slotEl = document.getElementById(`slot-${index}`);
            slotEl.style.opacity = "0.5";

            try {
                const res = await fetch(`https://${HOST}/v2/mobile-phone-specs-database/get-specifications-by-custom-id?custom_id=${id}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });
                const specs = await res.json();
                slots[index] = specs;
                
                slotEl.style.opacity = "1";
                slotEl.classList.add('slot-confirmed');
                slotEl.innerHTML = `
                    <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center mb-2 shadow-lg shadow-emerald-500/20">
                        <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <p class="text-xs font-bold text-center leading-tight uppercase italic">${name}</p>
                    <button onclick="location.reload()" class="mt-4 text-[9px] font-bold text-white/30 hover:text-red-400 uppercase tracking-widest">Trocar</button>
                `;
                
                const ativos = slots.filter(s => s !== null).length;
                document.getElementById('battleBtn').disabled = ativos < 2;
            } catch(e) {
                alert("Erro ao carregar detalhes.");
            }
        }

        function iniciarBatalha() {
            const selecionados = slots.filter(s => s !== null);
            document.getElementById('setupArea').classList.add('hidden');
            const area = document.getElementById('battleArea');
            area.classList.remove('hidden');
            setTimeout(() => { area.style.opacity = "1"; area.style.transform = "translateY(0)"; }, 100);

            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            head.innerHTML = `
                <tr>
                    <th class="p-6 text-emerald-400 text-[10px] font-black uppercase tracking-[0.2em] italic">Atributo</th>
                    ${selecionados.map(p => `
                        <th class="p-6 text-center border-l border-white/5">
                            <span class="block text-emerald-400 text-[9px] font-bold uppercase mb-1">${p.phoneDetails?.brandValue || ''}</span>
                            <span class="font-black text-sm uppercase leading-none">${p.phoneDetails?.modelValue || 'Smartphone'}</span>
                        </th>
                    `).join('')}
                </tr>
            `;

            const rows = [
                { label: 'Lançamento', val: p => p.phoneDetails?.yearValue },
                { label: 'Rede', val: p => p.gsmNetworkDetails?.networkSpeed },
                { label: 'Processador (CPU)', val: p => p.gsmPlatformDetails?.platformCpu },
                { label: 'Chipset', val: p => p.gsmPlatformDetails?.platformChipset },
                { label: 'Memória Interna', val: p => p.gsmMemoryDetails?.memoryInternal },
                { label: 'Câmera Principal', val: p => p.gsmMainCameraDetails?.mainCameraQuad || p.gsmMainCameraDetails?.mainCameraTriple },
                { label: 'Câmera de Selfie', val: p => p.gsmSelfieCameraDetails?.selfieCameraSingle },
                { label: 'Bateria', val: p => p.gsmBatteryDetails?.batteryType },
                { label: 'Tela', val: p => p.gsmDisplayDetails?.displayType },
                { label: 'Resolução', val: p => p.gsmDisplayDetails?.displayResolution },
                { label: 'Preço Estimado', val: p => p.gsmMiscDetails?.miscPrice }
            ];

            body.innerHTML = rows.map((row, i) => `
                <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                    <td class="p-5 text-emerald-500 font-bold text-[10px] uppercase bg-emerald-500/5">${row.label}</td>
                    ${selecionados.map(p => `<td class="p-5 text-center border-l border-white/5 font-light text-white/80">${row.val(p) || 'N/A'}</td>`).join('')}
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
