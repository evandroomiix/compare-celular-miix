<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Specs - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; overflow-x: hidden; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.12; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .slot-confirmed { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        
        /* Tabela Pro com Sidebar Fixa */
        .spec-sidebar { position: sticky; left: 0; background: #011511; z-index: 30; min-width: 140px; font-weight: 800; color: #10b981; font-size: 9px; text-transform: uppercase; border-right: 1px solid rgba(255, 255, 255, 0.1); padding: 15px !important; }
        .device-col { min-width: 200px; text-align: center; border-left: 1px solid rgba(255, 255, 255, 0.05); padding: 15px !important; }
        .cat-header { background: rgba(16, 185, 129, 0.1); color: #10b981; font-weight: 900; font-size: 10px; letter-spacing: 2px; text-align: center; }
        
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .loading { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #10b981; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tag-rumor { background: #f59e0b; color: black; font-size: 7px; padding: 2px 4px; border-radius: 3px; font-weight: 900; margin-left: 5px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[600px] h-[600px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[500px] h-[500px] bottom-0 right-0"></div>
    </div>

    <header class="max-w-7xl mx-auto text-center mb-10">
        <h1 class="text-4xl md:text-6xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent italic tracking-tighter uppercase">BATALHA DE SPECS</h1>
        <p class="text-emerald-500/60 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">Comparador Inteligente • Dados do Brasil</p>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="setupArea">
            <!-- 4 SLOTS DE BUSCA -->
            <div id="searchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                <script>
                    for(let i=0; i<4; i++) {
                        document.write(`
                            <div class="slot glass p-6 rounded-[2.5rem] flex flex-col items-center gap-4 border-white/5 transition-all relative" id="slot-${i}">
                                <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-widest">Aparelho 0${i+1}</span>
                                <input type="text" placeholder="Ex: S24 Ultra..." 
                                       oninput="debounceSearch(${i}, this.value)"
                                       class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-[11px] outline-none focus:border-emerald-500 transition-all uppercase">
                                <div id="result-${i}" class="w-full space-y-1 mt-2 max-h-56 overflow-y-auto z-50"></div>
                            </div>
                        `);
                    }
                </script>
            </div>

            <div class="flex justify-center mb-16">
                <button onclick="iniciarBatalha()" id="battleBtn" disabled class="bg-emerald-500 disabled:bg-white/5 disabled:text-white/20 text-black font-black px-16 py-5 rounded-full text-sm tracking-widest hover:scale-105 transition-all shadow-[0_0_30px_rgba(16,185,129,0.4)] uppercase">
                    Batalhar Agora
                </button>
            </div>
        </div>

        <!-- TABELA DE RESULTADO -->
        <div id="battleArea" class="hidden opacity-0 translate-y-10 transition-all duration-700">
            <div class="glass rounded-[3rem] overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead id="tableHead" class="bg-emerald-950/20"></thead>
                        <tbody id="tableBody" class="text-xs md:text-sm"></tbody>
                    </table>
                </div>
            </div>
            <div class="text-center mt-12 pb-20">
                <button onclick="location.reload()" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 px-10 py-4 rounded-full text-xs font-bold uppercase hover:bg-emerald-500 hover:text-black transition-all">Nova Batalha</button>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = '0adddb24fbmsh2289164deba91c5p1ff721jsn0d25d66220ff';
        const HOST = 'mobile-phone-specs-database.p.rapidapi.com';
        
        // BANCO DE DADOS LOCAL (SEGURANÇA CASO A API FALHE)
        const dbLocal = [
            { brand: "SAMSUNG", name: "GALAXY S24 ULTRA", slug: "samsung_galaxy_s24_ultra", price: "R$ 6.800", cpu: "Snapdragon 8 Gen 3", ram: "12GB", storage: "256GB/512GB/1TB", cam: "200MP + 50MP + 12MP", bat: "5000 mAh", screen: "6.8\" Dynamic AMOLED 2X", sensor: "Impressão Digital, Acelerômetro, Giroscópio" },
            { brand: "SAMSUNG", name: "GALAXY S23 FE", slug: "samsung_galaxy_s23_fe", price: "R$ 2.700", cpu: "Exynos 2200", ram: "8GB", storage: "128GB/256GB", cam: "50MP + 12MP + 8MP", bat: "4500 mAh", screen: "6.4\" AMOLED 120Hz", sensor: "Digital sob a tela, NFC" },
            { brand: "SAMSUNG", name: "GALAXY S25 ULTRA", rumor: true, price: "Previsão R$ 8.500", cpu: "Snapdragon 8 Gen 4", ram: "16GB", storage: "512GB/1TB", cam: "200MP (OIS)", bat: "5500 mAh", screen: "6.9\" LTPO 144Hz", sensor: "IA Integrada, Satélite" },
            { brand: "APPLE", name: "IPHONE 16 PRO MAX", slug: "apple_iphone_16_pro_max", price: "R$ 9.400", cpu: "Apple A18 Pro", ram: "8GB", storage: "256GB a 1TB", cam: "48MP + 48MP + 12MP", bat: "4676 mAh", screen: "6.9\" Super Retina XDR", sensor: "FaceID, LiDAR, Botão de Ação" },
            { brand: "APPLE", name: "IPHONE 15", slug: "apple_iphone_15", price: "R$ 4.800", cpu: "Apple A16 Bionic", ram: "6GB", storage: "128GB/256GB", cam: "48MP + 12MP", bat: "3349 mAh", screen: "6.1\" OLED", sensor: "Dynamic Island, USB-C" }
        ];

        const slotsData = [null, null, null, null];
        let timers = [null, null, null, null];

        function debounceSearch(index, query) {
            clearTimeout(timers[index]);
            if (query.length < 2) { document.getElementById(`result-${index}`).innerHTML = ''; return; }
            timers[index] = setTimeout(() => buscar(index, query), 500);
        }

        async function buscar(index, query) {
            const resDiv = document.getElementById(`result-${index}`);
            resDiv.innerHTML = '<div class="flex justify-center py-2"><div class="loading"></div></div>';

            // 1. Tenta buscar no banco Local primeiro
            const locais = dbLocal.filter(d => d.name.includes(query.toUpperCase()));
            
            try {
                const res = await fetch(`https://${HOST}/gsm/search-query/${query}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });
                const apiData = await res.json();
                
                resDiv.innerHTML = '';
                // Une Local + API
                const total = [...locais, ...(Array.isArray(apiData) ? apiData : [])];

                total.slice(0, 10).forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-3 rounded-xl bg-white/5 text-[10px] font-bold hover:bg-emerald-500 hover:text-black transition-all border border-white/5 mb-1 flex justify-between items-center uppercase truncate";
                    const nomeExibir = item.name ? `${item.brand} ${item.name}` : `${item.brand || ''} ${item.device_name || item.title}`;
                    btn.innerHTML = `<span>${nomeExibir}</span> ${item.rumor ? '<span class="tag-rumor">RUMOR</span>' : ''}`;
                    btn.onclick = () => selecionar(index, item);
                    resDiv.appendChild(btn);
                });
            } catch (e) {
                // Se a API falhar, mostra pelo menos os locais
                resDiv.innerHTML = '';
                locais.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-3 rounded-xl bg-white/5 text-[10px] font-bold hover:bg-emerald-500 hover:text-black border border-white/5 mb-1 uppercase";
                    btn.innerText = `${item.brand} ${item.name}`;
                    btn.onclick = () => selecionar(index, item);
                    resDiv.appendChild(btn);
                });
            }
        }

        async function selecionar(index, item) {
            const slotEl = document.getElementById(`slot-${index}`);
            const slug = item.slug || item.id;
            
            if (item.rumor) {
                // Se for rumor, usa os dados do banco local
                slotsData[index] = { phoneDetails: { brandValue: item.brand, modelValue: item.name, yearValue: "2025/26" }, gsmPlatformDetails: { platformCpu: item.cpu }, gsmMemoryDetails: { memoryInternal: item.ram + " / " + item.storage }, gsmMainCameraDetails: { mainCameraQuad: item.cam }, gsmBatteryDetails: { batteryType: item.bat }, gsmDisplayDetails: { displayType: item.screen }, gsmFeaturesDetails: { featuresOther1: item.sensor } };
            } else {
                // Se for real, tenta baixar da API
                try {
                    const res = await fetch(`https://${HOST}/gsm/get-specifications-by-slug/${slug}`, {
                        method: 'GET',
                        headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                    });
                    slotsData[index] = await res.json();
                } catch (e) { alert("API ocupada. Tente outro modelo."); return; }
            }

            slotEl.classList.add('slot-confirmed');
            slotEl.innerHTML = `
                <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center mb-2"><svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg></div>
                <p class="text-[10px] font-black text-center uppercase tracking-tighter">${item.name || item.device_name}</p>
                <button onclick="location.reload()" class="mt-4 text-[8px] font-bold opacity-30 uppercase">Trocar</button>
            `;
            document.getElementById('battleBtn').disabled = slotsData.filter(s => s !== null).length < 2;
        }

        function iniciarBatalha() {
            document.getElementById('setupArea').classList.add('hidden');
            const area = document.getElementById('battleArea');
            area.classList.remove('hidden');
            setTimeout(() => { area.style.opacity = "1"; area.style.transform = "translateY(0)"; }, 50);

            const ativos = slotsData.filter(s => s !== null);
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            head.innerHTML = `
                <tr>
                    <th class="p-5 spec-sidebar">Ficha Técnica</th>
                    ${ativos.map(p => `<th class="p-5 device-col font-black text-xs uppercase text-emerald-400">${p.phoneDetails?.brandValue || ''}<br><span class="text-white text-sm">${p.phoneDetails?.modelValue || 'Smartphone'}</span></th>`).join('')}
                </tr>
            `;

            const rows = [
                { cat: 'DESEMPENHO' },
                { label: 'Processador', val: p => p.gsmPlatformDetails?.platformCpu || p.gsmPlatformDetails?.cpu },
                { label: 'Chipset', val: p => p.gsmPlatformDetails?.platformChipset || p.gsmPlatformDetails?.chipset },
                { label: 'Memória e RAM', val: p => p.gsmMemoryDetails?.memoryInternal || p.gsmMemoryDetails?.internal },
                { cat: 'CÂMERAS' },
                { label: 'Traseira', val: p => p.gsmMainCameraDetails?.mainCameraQuad || p.gsmMainCameraDetails?.mainCameraTriple || p.gsmMainCameraDetails?.main_camera_single },
                { label: 'Selfie', val: p => p.gsmSelfieCameraDetails?.selfieCameraSingle || p.gsmSelfieCameraDetails?.camera_selfie },
                { cat: 'BATERIA E TELA' },
                { label: 'Bateria', val: p => p.gsmBatteryDetails?.batteryType || p.gsmBatteryDetails?.battery_type },
                { label: 'Tela', val: p => p.gsmDisplayDetails?.displayType || p.gsmDisplayDetails?.display_type },
                { label: 'Extras', val: p => p.gsmFeaturesDetails?.featuresOther1 || p.gsmFeaturesDetails?.featuresSensors || 'N/D' }
            ];

            body.innerHTML = rows.map(r => {
                if(r.cat) return `<tr class="cat-header"><td colspan="${ativos.length + 1}" class="p-3 uppercase tracking-widest">${r.cat}</td></tr>`;
                return `<tr class="border-b border-white/5 hover:bg-white/[0.02]">
                    <td class="p-4 spec-sidebar">${r.label}</td>
                    ${ativos.map(p => `<td class="p-4 device-col text-[10px] text-white/80">${r.val(p) || 'Não informado'}</td>`).join('')}
                </tr>`;
            }).join('');
        }
    </script>
</body>
</html>
