<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Specs - O Melhor Comparador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; overflow-x: hidden; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.12; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .selected-card { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.15) !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        input::placeholder { color: rgba(255, 255, 255, 0.3); }
        .title-gradient { background: linear-gradient(to right, #10b981, #d1fae5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- Fundo Aurora -->
    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[500px] h-[500px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[400px] h-[400px] bottom-0 right-0"></div>
    </div>

    <!-- Título Brasileiro -->
    <header class="max-w-6xl mx-auto text-center mb-10">
        <h1 class="text-4xl md:text-6xl font-extrabold title-gradient italic tracking-tighter uppercase">BATALHA DE SPECS</h1>
        <p class="text-emerald-500/60 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">O Comparador n.º 1 do Brasil</p>
    </header>

    <main class="max-w-6xl mx-auto">
        <!-- Campo de Pesquisa -->
        <div class="glass p-6 md:p-8 rounded-[2.5rem] mb-8 shadow-2xl">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="phoneInput" placeholder="Qual celular você quer ver? Ex: S24 Ultra, iPhone 16..." 
                       class="flex-1 bg-white/5 border border-white/10 rounded-full px-7 py-4 outline-none focus:border-emerald-500 transition-all text-sm">
                <button onclick="searchPhones()" class="bg-emerald-500 text-black font-extrabold px-12 py-4 rounded-full hover:bg-emerald-400 transition-all shadow-[0_0_20px_rgba(16,185,129,0.4)]">
                    PESQUISAR
                </button>
            </div>
        </div>

        <!-- Resultados da Busca -->
        <div id="resultsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <!-- Os celulares buscados aparecerão aqui -->
        </div>

        <!-- Barra de Seleção -->
        <div id="selectionBar" class="hidden glass p-6 rounded-3xl mb-10 flex flex-col md:flex-row items-center justify-between gap-6 border-emerald-500/20">
            <div class="flex items-center gap-4">
                <div class="h-10 w-1 bg-emerald-500 rounded-full"></div>
                <p id="selectionText" class="text-sm font-bold text-emerald-100 italic tracking-wide">Escolha os aparelhos</p>
            </div>
            <button onclick="generateComparison()" id="compareBtn" disabled class="bg-emerald-500 disabled:bg-white/10 disabled:text-white/20 text-black px-12 py-4 rounded-full font-black transition-all">
                BATALHAR AGORA
            </button>
        </div>

        <!-- Área da Batalha (Tabela) -->
        <div id="comparisonArea" class="hidden mb-24">
            <div class="glass rounded-[3rem] overflow-hidden">
                <div class="table-container overflow-x-auto">
                    <table class="w-full text-left min-w-[800px]">
                        <thead id="tableHead" class="border-b border-white/10"></thead>
                        <tbody id="tableBody" class="text-xs md:text-sm"></tbody>
                    </table>
                </div>
            </div>
            <div class="mt-8 flex justify-center">
                <button onclick="location.reload()" class="bg-white/5 border border-white/10 px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-red-500/20 hover:border-red-500/50 transition-all">
                    Reiniciar Batalha
                </button>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center opacity-20 text-[10px] uppercase tracking-widest">
        Batalha de Specs - Atualizado Automaticamente
    </footer>

    <script>
        // Sua chave API
        const API_KEY = '0adddb24fbmsh2289164deba91c5p1ff721jsn0d25d66220ff'; 

        let selectedPhones = [];

        async function searchPhones() {
            const query = document.getElementById('phoneInput').value;
            if(!query) return;
            
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-emerald-400 animate-pulse font-bold tracking-widest uppercase">Buscando Aparelhos...</div>';

            try {
                const response = await fetch(`https://mobile-phone-specs-database.p.rapidapi.com/gsm/search-query/${query}`, {
                    method: 'GET',
                    headers: {
                        'X-RapidAPI-Key': API_KEY,
                        'X-RapidAPI-Host': 'mobile-phone-specs-database.p.rapidapi.com'
                    }
                });
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                grid.innerHTML = '<div class="col-span-full text-red-500 text-center glass p-6 rounded-2xl">Falha na busca. Verifique sua conexão.</div>';
            }
        }

        function displayResults(data) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            
            data.forEach(item => {
                const card = document.createElement('div');
                card.id = `card-${item.slug}`;
                card.className = "glass p-5 rounded-[2rem] cursor-pointer hover:border-emerald-500/50 transition-all text-center group relative overflow-hidden";
                card.innerHTML = `
                    <div class="h-24 w-full bg-white/5 rounded-2xl mb-4 flex items-center justify-center border border-white/5 group-hover:bg-emerald-500/10">
                        <span class="text-[8px] text-emerald-500/40 font-black uppercase tracking-widest">Mobile Device</span>
                    </div>
                    <p class="text-[10px] text-emerald-400 font-bold uppercase mb-1 opacity-60">${item.brand || 'Original'}</p>
                    <p class="text-xs font-black leading-tight mb-4">${item.device_name || item.title}</p>
                    <button onclick="selectPhone('${item.slug}')" class="w-full bg-emerald-500/10 py-3 rounded-2xl text-[10px] font-black uppercase tracking-tighter hover:bg-emerald-500 hover:text-black transition-all">Adicionar</button>
                `;
                grid.appendChild(card);
            });
        }

        async function selectPhone(slug) {
            const index = selectedPhones.findIndex(p => p.slug === slug);
            
            if(index > -1) {
                selectedPhones.splice(index, 1);
                document.getElementById(`card-${slug}`).classList.remove('selected-card');
            } else {
                if(selectedPhones.length >= 4) return alert("Máximo 4 aparelhos!");
                
                try {
                    const res = await fetch(`https://mobile-phone-specs-database.p.rapidapi.com/gsm/get-specifications-by-slug/${slug}`, {
                        method: 'GET',
                        headers: { 'X-RapidAPI-Key': API_KEY }
                    });
                    const specs = await res.json();
                    selectedPhones.push({slug, ...specs});
                    document.getElementById(`card-${slug}`).classList.add('selected-card');
                } catch(e) { alert("Erro ao carregar detalhes."); }
            }
            updateUI();
        }

        function updateUI() {
            const bar = document.getElementById('selectionBar');
            const text = document.getElementById('selectionText');
            const btn = document.getElementById('compareBtn');

            if(selectedPhones.length > 0) bar.classList.remove('hidden');
            else bar.classList.add('hidden');

            text.innerHTML = `VOCÊ ESCOLHEU ${selectedPhones.length} CELULAR(ES) <span class="text-white/20 font-light mx-2">|</span> ${selectedPhones.length < 2 ? 'FALTAM ' + (2 - selectedPhones.length) : 'PRONTO PARA A BATALHA!'}`;
            btn.disabled = selectedPhones.length < 2;
        }

        function generateComparison() {
            const area = document.getElementById('comparisonArea');
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            area.classList.remove('hidden');

            head.innerHTML = `
                <tr class="bg-emerald-500/5">
                    <th class="p-6 text-emerald-400 text-[11px] font-black uppercase italic tracking-widest">Atributo</th>
                    ${selectedPhones.map(p => `<th class="p-6 text-center border-l border-white/5 font-black text-sm uppercase">${p.device_name}</th>`).join('')}
                </tr>
            `;

            // Mapeamento dos campos da API para PT-BR
            const rows = [
                { label: 'Processador', key: 'cpu' },
                { label: 'Plataforma (Chipset)', key: 'chipset' },
                { label: 'Memória Interna', key: 'internal' },
                { label: 'Câmera Principal', key: 'main_camera_single' },
                { label: 'Câmera de Selfie', key: 'selfie_camera_single' },
                { label: 'Capacidade da Bateria', key: 'battery_type' },
                { label: 'Tecnologia da Tela', key: 'display_type' },
                { label: 'Resolução da Tela', key: 'display_resolution' }
            ];

            body.innerHTML = rows.map((row, i) => `
                <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                    <td class="p-5 text-emerald-500/80 font-bold text-[10px] uppercase bg-emerald-500/5">${row.label}</td>
                    ${selectedPhones.map(p => `<td class="p-5 text-center border-l border-white/5 font-light">${p[row.key] || 'Informação não disponível'}</td>`).join('')}
                </tr>
            `).join('');

            window.scrollTo({ top: area.offsetTop - 100, behavior: 'smooth' });
        }
    </script>
</body>
</html>
