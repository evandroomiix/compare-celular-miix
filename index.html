<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Specs - O Comparador n.º 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; overflow-x: hidden; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .slot-confirmed { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }
        .loading-spin { border: 2px solid #ffffff10; border-top: 2px solid #10b981; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .dropdown-results { max-height: 250px; overflow-y: auto; z-index: 50; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[500px] h-[500px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[400px] h-[400px] bottom-0 right-0"></div>
    </div>

    <header class="max-w-7xl mx-auto text-center mb-10">
        <h1 class="text-4xl md:text-6xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent italic tracking-tighter uppercase">BATALHA DE SPECS</h1>
        <p class="text-emerald-500/60 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">Tecnologia, Comparação e Preços</p>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="setupArea">
            <!-- 4 COLUNAS DE BUSCA INSTANTÂNEA -->
            <div id="searchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                <script>
                    for(let i=0; i<4; i++) {
                        document.write(`
                            <div class="slot glass p-6 rounded-[2.5rem] flex flex-col items-center gap-4 border-white/5 transition-all relative" id="slot-${i}">
                                <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-widest">Aparelho 0${i+1}</span>
                                <input type="text" placeholder="Digite para buscar..." 
                                       oninput="debounceSearch(${i}, this.value)"
                                       class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-[11px] outline-none focus:border-emerald-500 transition-all uppercase">
                                <div id="result-${i}" class="dropdown-results w-full space-y-1 mt-2"></div>
                            </div>
                        `);
                    }
                </script>
            </div>

            <div class="flex justify-center mb-16">
                <button onclick="iniciarBatalha()" id="battleBtn" disabled class="bg-emerald-500 disabled:bg-white/5 disabled:text-white/20 text-black font-black px-16 py-5 rounded-full text-sm tracking-widest hover:scale-105 transition-all shadow-lg uppercase shadow-emerald-500/20">
                    Batalhar Agora
                </button>
            </div>
        </div>

        <!-- RESULTADO -->
        <div id="battleArea" class="hidden opacity-0 translate-y-10 transition-all duration-700">
            <div class="glass rounded-[3rem] overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[800px]">
                        <thead id="tableHead" class="border-b border-white/10 bg-emerald-500/5 text-sm uppercase"></thead>
                        <tbody id="tableBody" class="text-xs md:text-sm"></tbody>
                    </table>
                </div>
            </div>
            <div class="text-center mt-12 pb-20">
                <button onclick="location.reload()" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 px-10 py-4 rounded-full text-xs font-bold uppercase hover:bg-emerald-500 hover:text-black transition-all">Nova Batalha</button>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = '0adddb24fbmsh2289164deba91c5p1ff721jsn0d25d66220ff'.trim();
        const HOST = 'phone-specs-explorer-api.p.rapidapi.com';
        const slotsData = [null, null, null, null];
        let timers = [null, null, null, null];

        // Função para não estourar a API (espera o usuário parar de digitar)
        function debounceSearch(index, query) {
            clearTimeout(timers[index]);
            if (query.length < 2) {
                document.getElementById(`result-${index}`).innerHTML = '';
                return;
            }
            timers[index] = setTimeout(() => buscarNoSlot(index, query), 500);
        }

        async function buscarNoSlot(index, query) {
            const resDiv = document.getElementById(`result-${index}`);
            resDiv.innerHTML = '<div class="flex justify-center py-4"><div class="loading-spin"></div></div>';

            try {
                const response = await fetch(`https://${HOST}/2165/search?q=${encodeURIComponent(query)}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });
                const responseData = await response.json();
                const results = responseData.data || [];

                resDiv.innerHTML = '';
                results.slice(0, 6).forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-3 rounded-2xl bg-white/5 text-[10px] font-semibold hover:bg-emerald-500 hover:text-black transition-all border border-white/5 mb-1 truncate uppercase flex items-center gap-2";
                    btn.innerHTML = `<span class="opacity-30">#</span> ${item.phone_model}`;
                    btn.onclick = () => selecionarParaSlot(index, item);
                    resDiv.appendChild(btn);
                });
            } catch (err) { console.error(err); }
        }

        async function selecionarParaSlot(index, item) {
            const slotEl = document.getElementById(`slot-${index}`);
            const specsFinais = {
                brand: item.brand_name,
                phone_name: item.phone_model,
                description: item.description,
                image_url: item.image_url,
                id: item.id
            };

            // Tentativa de buscar specs full (mesmo que dê 404, usamos o fallback da descrição)
            try {
                const res = await fetch(`https://${HOST}/2165/specifications?id=${item.id}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });
                if(res.ok) {
                    const fullData = await res.json();
                    specsFinais.fullSpecs = fullData.data || fullData;
                }
            } catch(e) {}

            slotsData[index] = specsFinais;
            slotEl.classList.add('slot-confirmed');
            slotEl.innerHTML = `
                <img src="${item.image_url || 'https://via.placeholder.com/100x150?text=Sem+Foto'}" class="h-28 object-contain mb-2 drop-shadow-2xl">
                <p class="text-[11px] font-bold text-center uppercase italic">${item.phone_model}</p>
                <button onclick="location.reload()" class="mt-2 text-[8px] font-bold text-red-400 uppercase tracking-widest">Remover</button>
            `;
            document.getElementById('battleBtn').disabled = slotsData.filter(s => s !== null).length < 2;
        }

        function extrair(p, regex, label) {
            const match = p.description.match(regex);
            return match ? match[1] : "Consulte Loja";
        }

        function iniciarBatalha() {
            document.getElementById('setupArea').classList.add('hidden');
            const area = document.getElementById('battleArea');
            area.classList.remove('hidden');
            setTimeout(() => { area.style.opacity = "1"; area.style.transform = "translateY(0)"; }, 100);

            const selecionados = slotsData.filter(s => s !== null);
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            head.innerHTML = `
                <tr>
                    <th class="p-6 text-emerald-400 text-[10px] font-black italic tracking-widest uppercase">Atributo</th>
                    ${selecionados.map(p => `<th class="p-6 text-center border-l border-white/5 font-black text-sm uppercase">${p.phone_name}</th>`).join('')}
                </tr>
            `;

            const rows = [
                { label: 'Preço Médio (Est.)', val: p => extrair(p, /(\$\s?\d+)/, 'Preço') || "Consultar Varejo" },
                { label: 'Processador', val: p => extrair(p, /([\w\s-]+chipset)/i, 'CPU') },
                { label: 'Memória RAM', val: p => extrair(p, /(\d+\s+(?:GB|MB)\s+RAM)/i, 'RAM') },
                { label: 'Câmera Principal', val: p => extrair(p, /(\d+\s+MP\s+primary)/i, 'Cam') },
                { label: 'Bateria', val: p => extrair(p, /(\d+\s+mAh\s+battery)/i, 'Bat') },
                { label: 'Tela', val: p => extrair(p, /(\d+\.?\d*[″"]\s+display)/i, 'Tela') },
                { label: 'Armazenamento', val: p => extrair(p, /(\d+\s+GB\s+storage)/i, 'HD') }
            ];

            body.innerHTML = rows.map((row, i) => `
                <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                    <td class="p-5 text-emerald-500 font-bold text-[10px] uppercase bg-emerald-500/5">${row.label}</td>
                    ${selecionados.map(p => `<td class="p-5 text-center border-l border-white/5 font-light text-[11px] text-white/80">${row.val(p)}</td>`).join('')}
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
