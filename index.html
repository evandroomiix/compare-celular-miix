<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Specs - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; overflow-x: hidden; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .slot-confirmed { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }
        .loading-spin { border: 2px solid #ffffff10; border-top: 2px solid #10b981; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[500px] h-[500px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[400px] h-[400px] bottom-0 right-0"></div>
    </div>

    <header class="max-w-7xl mx-auto text-center mb-10">
        <h1 class="text-4xl md:text-6xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent italic tracking-tighter uppercase">BATALHA DE SPECS</h1>
        <p class="text-emerald-500/60 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">Duelo de Titãs em Tempo Real</p>
    </header>

    <main class="max-w-7xl mx-auto">
        
        <!-- GRID DE 4 COLUNAS FIXAS -->
        <div id="setupArea">
            <div id="searchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                <!-- SLOT 1 -->
                <div class="slot glass p-6 rounded-[2.5rem] flex flex-col items-center gap-4 transition-all" id="slot-0">
                    <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-widest">Aparelho 1</span>
                    <input type="text" placeholder="Buscar modelo..." onchange="executarBusca(0, this.value)" class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-xs outline-none focus:border-emerald-500">
                    <div id="result-0" class="w-full space-y-1 max-h-40 overflow-y-auto"></div>
                </div>
                <!-- SLOT 2 -->
                <div class="slot glass p-6 rounded-[2.5rem] flex flex-col items-center gap-4 transition-all" id="slot-1">
                    <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-widest">Aparelho 2</span>
                    <input type="text" placeholder="Buscar modelo..." onchange="executarBusca(1, this.value)" class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-xs outline-none focus:border-emerald-500">
                    <div id="result-1" class="w-full space-y-1 max-h-40 overflow-y-auto"></div>
                </div>
                <!-- SLOT 3 -->
                <div class="slot glass p-6 rounded-[2.5rem] flex flex-col items-center gap-4 transition-all" id="slot-2">
                    <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-widest">Aparelho 3</span>
                    <input type="text" placeholder="Buscar modelo..." onchange="executarBusca(2, this.value)" class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-xs outline-none focus:border-emerald-500">
                    <div id="result-2" class="w-full space-y-1 max-h-40 overflow-y-auto"></div>
                </div>
                <!-- SLOT 4 -->
                <div class="slot glass p-6 rounded-[2.5rem] flex flex-col items-center gap-4 transition-all" id="slot-3">
                    <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-widest">Aparelho 4</span>
                    <input type="text" placeholder="Buscar modelo..." onchange="executarBusca(3, this.value)" class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-xs outline-none focus:border-emerald-500">
                    <div id="result-3" class="w-full space-y-1 max-h-40 overflow-y-auto"></div>
                </div>
            </div>

            <!-- BOTÃO BATALHAR -->
            <div class="flex justify-center mb-16">
                <button onclick="batalhar()" id="battleBtn" disabled class="bg-emerald-500 disabled:bg-white/5 disabled:text-white/20 text-black font-black px-16 py-5 rounded-full text-sm tracking-widest hover:scale-105 transition-all shadow-[0_0_30px_rgba(16,185,129,0.3)] uppercase">
                    Batalhar Agora
                </button>
            </div>
        </div>

        <!-- ÁREA DA TABELA (RESULTADO) -->
        <div id="battleArea" class="hidden opacity-0 translate-y-10 transition-all duration-700">
            <div class="glass rounded-[3rem] overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[800px]">
                        <thead id="tableHead" class="border-b border-white/10 bg-emerald-500/5"></thead>
                        <tbody id="tableBody" class="text-xs md:text-sm"></tbody>
                    </table>
                </div>
            </div>
            <div class="text-center mt-12 pb-20">
                <button onclick="location.reload()" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 px-10 py-4 rounded-full text-xs font-bold uppercase hover:bg-emerald-500 hover:text-black transition-all">Nova Batalha</button>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURAÇÕES DA API
        const API_KEY = '0adddb24fbmsh2289164deba91c5p1ff721jsn0d25d66220ff';
        const HOST = 'mobile-phone-specs-database.p.rapidapi.com';
        
        const aparelhosSelecionados = [null, null, null, null];

        async function executarBusca(slotIndex, query) {
            if(!query) return;
            const resDiv = document.getElementById(`result-${slotIndex}`);
            resDiv.innerHTML = '<div class="flex justify-center py-4"><div class="loading-spin"></div></div>';

            try {
                const response = await fetch(`https://${HOST}/gsm/search-query/${query}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });

                if(response.status === 403) {
                    resDiv.innerHTML = '<p class="text-[9px] text-red-400 text-center">Assine o plano Free no RapidAPI</p>';
                    return;
                }

                const data = await response.json();
                resDiv.innerHTML = '';

                data.slice(0, 5).forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-3 rounded-2xl bg-white/5 text-[10px] font-semibold hover:bg-emerald-500 hover:text-black transition-all border border-white/5 mb-1 truncate";
                    btn.innerText = item.device_name;
                    btn.onclick = () => carregarEspecificacoes(slotIndex, item.slug, item.device_name);
                    resDiv.appendChild(btn);
                });
            } catch (err) {
                resDiv.innerHTML = '<p class="text-[9px] text-red-400 text-center">Falha na conexão</p>';
            }
        }

        async function carregarEspecificacoes(slotIndex, slug, name) {
            const slotEl = document.getElementById(`slot-${slotIndex}`);
            const resDiv = document.getElementById(`result-${slotIndex}`);
            resDiv.innerHTML = '<div class="flex justify-center py-4"><div class="loading-spin"></div></div>';

            try {
                const response = await fetch(`https://${HOST}/gsm/get-specifications-by-slug/${slug}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });
                const specs = await response.json();
                
                // Salva o JSON no slot correspondente
                aparelhosSelecionados[slotIndex] = specs;

                // Atualiza o visual do slot
                slotEl.classList.add('slot-confirmed');
                slotEl.innerHTML = `
                    <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center mb-2 shadow-lg shadow-emerald-500/20">
                        <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <p class="text-xs font-bold text-center leading-tight uppercase italic">${name}</p>
                    <button onclick="location.reload()" class="mt-4 text-[9px] text-white/30 hover:text-red-400 font-bold uppercase">Trocar</button>
                `;

                // Verifica se pode habilitar o botão de batalha (mínimo 2)
                const prontos = aparelhosSelecionados.filter(a => a !== null).length;
                document.getElementById('battleBtn').disabled = prontos < 2;

            } catch(e) {
                resDiv.innerHTML = '<p class="text-[9px] text-red-400 text-center">Erro ao carregar</p>';
            }
        }

        function batalhar() {
            const ativos = aparelhosSelecionados.filter(a => a !== null);
            document.getElementById('setupArea').classList.add('hidden');
            
            const area = document.getElementById('battleArea');
            area.classList.remove('hidden');
            setTimeout(() => { area.style.opacity = "1"; area.style.transform = "translateY(0)"; }, 100);

            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            // Monta o topo da tabela
            head.innerHTML = `
                <tr>
                    <th class="p-6 text-emerald-400 text-[10px] font-black uppercase tracking-[0.2em] italic">Atributo</th>
                    ${ativos.map(p => `
                        <th class="p-6 text-center border-l border-white/5">
                            <span class="block text-emerald-500 text-[9px] font-bold uppercase mb-1">${p.phoneDetails?.brandValue || ''}</span>
                            <span class="font-black text-sm uppercase leading-none">${p.phoneDetails?.modelValue || 'Smartphone'}</span>
                        </th>
                    `).join('')}
                </tr>
            `;

            // Mapeia os dados do JSON que você enviou para a tabela
            const rows = [
                { label: 'Lançamento', val: p => p.phoneDetails?.yearValue },
                { label: 'Rede/Velocidade', val: p => p.gsmNetworkDetails?.networkSpeed },
                { label: 'Chipset (Coração)', val: p => p.gsmPlatformDetails?.platformChipset },
                { label: 'Processador (CPU)', val: p => p.gsmPlatformDetails?.platformCpu },
                { label: 'Sistema (OS)', val: p => p.gsmPlatformDetails?.platformOs },
                { label: 'Memória e RAM', val: p => p.gsmMemoryDetails?.memoryInternal },
                { label: 'Câmera Traseira', val: p => p.gsmMainCameraDetails?.mainCameraQuad },
                { label: 'Câmera Frontal', val: p => p.gsmSelfieCameraDetails?.selfieCameraSingle },
                { label: 'Bateria', val: p => p.gsmBatteryDetails?.batteryType },
                { label: 'Carregamento', val: p => p.gsmBatteryDetails?.batteryCharging },
                { label: 'Tela', val: p => p.gsmDisplayDetails?.displayType },
                { label: 'Dimensões', val: p => p.gsmBodyDetails?.bodyDimensions },
                { label: 'Preço Estimado', val: p => p.gsmMiscDetails?.miscPrice }
            ];

            body.innerHTML = rows.map((row, i) => `
                <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                    <td class="p-5 text-emerald-500 font-bold text-[10px] uppercase bg-emerald-500/5">${row.label}</td>
                    ${ativos.map(p => `<td class="p-5 text-center border-l border-white/5 font-light text-[11px] text-white/80">${row.val(p) || 'Não informado'}</td>`).join('')}
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
