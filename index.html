<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Auto-Spec</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; opacity: 0.15; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-selected { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; }
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <div class="aurora-bg">
        <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-emerald-900 via-transparent to-teal-900"></div>
    </div>

    <header class="max-w-6xl mx-auto text-center my-10">
        <h1 class="text-4xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent italic">AURORA AUTOMATIC</h1>
        <p class="text-xs text-emerald-500/60 mt-2">DADOS ATUALIZADOS EM TEMPO REAL VIA API</p>
    </header>

    <main class="max-w-5xl mx-auto">
        <!-- BUSCA -->
        <div class="glass p-8 rounded-[2.5rem] mb-10">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="phoneInput" placeholder="Digite o nome (ex: S24 Ultra ou iPhone 15)" 
                       class="flex-1 bg-white/5 border border-white/10 rounded-full px-6 py-4 outline-none focus:border-emerald-500 transition-all">
                <button onclick="searchPhones()" class="bg-emerald-500 text-black font-bold px-8 py-4 rounded-full hover:bg-emerald-400 transition-all">
                    BUSCAR CELULAR
                </button>
            </div>
            <p class="text-[10px] text-white/30 mt-4 text-center italic">A busca pode demorar alguns segundos enquanto consultamos o banco de dados global.</p>
        </div>

        <!-- RESULTADOS DA BUSCA -->
        <div id="resultsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10"></div>

        <!-- AREA DE COMPARAÇÃO -->
        <div id="comparisonArea" class="hidden glass rounded-[3rem] p-6 md:p-10 overflow-x-auto shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-emerald-400">Comparativo Gerado:</h2>
            <table class="w-full text-left min-w-[600px]" id="compTable">
                <!-- Tabela gerada via JS -->
            </table>
        </div>
    </main>

    <script>
        // COLOQUE SUA CHAVE DO RAPIDAPI AQUI ENTRE AS ASPAS
        const API_KEY = 'SUA_CHAVE_AQUI'; 

        let selectedPhones = [];

        async function searchPhones() {
            const query = document.getElementById('phoneInput').value;
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '<p class="col-span-full text-center py-10 opacity-50">Consultando servidores...</p>';

            try {
                const response = await fetch(`https://mobile-phone-specs-database.p.rapidapi.com/gsm/search-query/${query}`, {
                    method: 'GET',
                    headers: {
                        'X-RapidAPI-Key': API_KEY,
                        'X-RapidAPI-Host': 'mobile-phone-specs-database.p.rapidapi.com'
                    }
                });
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                grid.innerHTML = '<p class="col-span-full text-red-400 text-center">Erro ao buscar. Verifique sua API Key.</p>';
            }
        }

        function displayResults(data) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            
            // Note: O formato exato depende da API escolhida no RapidAPI
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = "glass p-4 rounded-3xl cursor-pointer hover:border-emerald-500 transition-all text-center";
                card.innerHTML = `
                    <div class="h-32 bg-white/5 rounded-2xl mb-3 flex items-center justify-center italic text-[10px] text-white/20">Sem Foto</div>
                    <p class="text-xs font-bold">${item.title || item.device_name}</p>
                    <button onclick="getSpecs('${item.slug || item.id}')" class="mt-3 text-[10px] bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full">Selecionar</button>
                `;
                grid.appendChild(card);
            });
        }

        async function getSpecs(slug) {
            if(selectedPhones.length >= 4) return alert("Máximo 4 aparelhos");

            // Busca os detalhes específicos do celular clicado
            try {
                const response = await fetch(`https://mobile-phone-specs-database.p.rapidapi.com/gsm/get-specifications-by-slug/${slug}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY }
                });
                const specs = await response.json();
                selectedPhones.push(specs);
                renderComparison();
            } catch (e) { alert("Erro ao obter detalhes"); }
        }

        function renderComparison() {
            if(selectedPhones.length < 1) return;
            const area = document.getElementById('comparisonArea');
            const table = document.getElementById('compTable');
            area.classList.remove('hidden');

            // Aqui montamos a tabela dinamicamente com os dados da API
            // O mapeamento abaixo varia conforme a API retorna os nomes (CPU, Battery, etc)
            let html = `
                <tr>
                    <th class="p-4 text-emerald-500 text-xs">Modelo</th>
                    ${selectedPhones.map(p => `<th class="p-4 text-center border-l border-white/5">${p.device_name}</th>`).join('')}
                </tr>
                <tr>
                    <td class="p-4 text-white/40 text-sm">Processador</td>
                    ${selectedPhones.map(p => `<td class="p-4 text-center border-l border-white/5 text-sm">${p.chipset || 'N/A'}</td>`).join('')}
                </tr>
                <tr>
                    <td class="p-4 text-white/40 text-sm bg-white/5">Bateria</td>
                    ${selectedPhones.map(p => `<td class="p-4 text-center border-l border-white/5 text-sm bg-white/5">${p.battery_type || 'N/A'}</td>`).join('')}
                </tr>
            `;
            table.innerHTML = html;
        }
    </script>
</body>
</html>
