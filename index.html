<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Specs - Comparador Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; overflow-x: hidden; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.12; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .slot-confirmed { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; box-shadow: 0 0 30px rgba(16, 185, 129, 0.2); }
        
        /* Tabela Estilo TudoCelular */
        .spec-col { position: sticky; left: 0; background: #011511; z-index: 20; min-width: 150px; font-weight: 800; color: #10b981; font-size: 9px; text-transform: uppercase; border-right: 1px solid rgba(255, 255, 255, 0.1); padding-left: 15px !important; }
        .device-data { min-width: 220px; text-align: center; border-left: 1px solid rgba(255, 255, 255, 0.05); }
        .category-row { background: rgba(16, 185, 129, 0.15); color: #10b981; font-weight: 900; font-size: 10px; letter-spacing: 2px; }
        
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .loading-spin { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #10b981; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[600px] h-[600px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[500px] h-[500px] bottom-0 right-0"></div>
    </div>

    <header class="max-w-7xl mx-auto text-center mb-10">
        <h1 class="text-4xl md:text-6xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent italic tracking-tighter uppercase">BATALHA DE SPECS</h1>
        <p class="text-emerald-500/60 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">O comparador técnico mais completo do Brasil</p>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="setupArea">
            <!-- 4 SLOTS DE BUSCA -->
            <div id="searchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                <script>
                    for(let i=0; i<4; i++) {
                        document.write(`
                            <div class="slot glass p-6 rounded-[2.5rem] flex flex-col items-center gap-4 border-white/5 transition-all relative" id="slot-${i}">
                                <span class="text-[9px] font-black text-emerald-500/40 uppercase tracking-widest">Aparelho 0${i+1}</span>
                                <input type="text" placeholder="Marca e Modelo..." 
                                       oninput="debounceSearch(${i}, this.value)"
                                       class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-3 text-[11px] outline-none focus:border-emerald-500 transition-all uppercase">
                                <div id="result-${i}" class="w-full space-y-1 mt-2 max-h-56 overflow-y-auto scrollbar-hide z-50"></div>
                            </div>
                        `);
                    }
                </script>
            </div>

            <div class="flex justify-center mb-16">
                <button onclick="iniciarBatalha()" id="battleBtn" disabled class="bg-emerald-500 disabled:bg-white/5 disabled:text-white/20 text-black font-black px-16 py-5 rounded-full text-sm tracking-widest hover:scale-105 transition-all shadow-[0_0_30px_rgba(16,185,129,0.4)] uppercase">
                    Batalhar Agora
                </button>
            </div>
        </div>

        <!-- TABELA PROFISSIONAL -->
        <div id="battleArea" class="hidden opacity-0 translate-y-10 transition-all duration-700">
            <div class="glass rounded-[3rem] overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead id="tableHead" class="border-b border-white/10 bg-emerald-950/30"></thead>
                        <tbody id="tableBody" class="text-xs md:text-sm"></tbody>
                    </table>
                </div>
            </div>
            <div class="text-center mt-12 pb-20">
                <button onclick="location.reload()" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 px-10 py-4 rounded-full text-xs font-bold uppercase hover:bg-emerald-500 hover:text-black transition-all">Nova Comparação</button>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = '0adddb24fbmsh2289164deba91c5p1ff721jsn0d25d66220ff';
        const HOST = 'mobile-phone-specs-database.p.rapidapi.com';
        const slotsData = [null, null, null, null];
        let timers = [null, null, null, null];

        function debounceSearch(index, query) {
            clearTimeout(timers[index]);
            if (query.length < 2) { document.getElementById(`result-${index}`).innerHTML = ''; return; }
            timers[index] = setTimeout(() => buscar(index, query), 500);
        }

        async function buscar(index, query) {
            const resDiv = document.getElementById(`result-${index}`);
            resDiv.innerHTML = '<div class="flex justify-center py-4"><div class="loading-spin"></div></div>';
            try {
                const res = await fetch(`https://${HOST}/gsm/search-query/${query}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });
                const data = await res.json();
                resDiv.innerHTML = '';
                data.slice(0, 10).forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-3 rounded-xl bg-white/5 text-[10px] font-bold hover:bg-emerald-500 hover:text-black transition-all border border-white/5 mb-1 uppercase truncate";
                    // Forçando Marca + Modelo no texto
                    btn.innerText = `${item.brand || ''} ${item.device_name || item.title}`.trim();
                    btn.onclick = () => selecionar(index, item.slug, btn.innerText);
                    resDiv.appendChild(btn);
                });
            } catch (e) { resDiv.innerHTML = '<p class="text-[8px] text-red-400">Erro na API</p>'; }
        }

        async function selecionar(index, slug, fullName) {
            const slotEl = document.getElementById(`slot-${index}`);
            slotEl.innerHTML = '<div class="loading-spin"></div>';
            try {
                const res = await fetch(`https://${HOST}/gsm/get-specifications-by-slug/${slug}`, {
                    method: 'GET',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'X-RapidAPI-Host': HOST }
                });
                const data = await res.json();
                slotsData[index] = data;
                slotEl.classList.add('slot-confirmed');
                slotEl.innerHTML = `
                    <div class="w-12 h-12 bg-emerald-500/20 rounded-full flex items-center justify-center mb-2"><svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                    <p class="text-[10px] font-black text-center uppercase tracking-tighter leading-tight">${fullName}</p>
                    <button onclick="location.reload()" class="mt-4 text-[8px] font-bold text-white/20 uppercase">Trocar</button>
                `;
                document.getElementById('battleBtn').disabled = slotsData.filter(s => s !== null).length < 2;
            } catch (e) { alert("Erro ao carregar detalhes."); }
        }

        function iniciarBatalha() {
            document.getElementById('setupArea').classList.add('hidden');
            const area = document.getElementById('battleArea');
            area.classList.remove('hidden');
            setTimeout(() => { area.style.opacity = "1"; area.style.transform = "translateY(0)"; }, 100);

            const ativos = slotsData.filter(s => s !== null);
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            // Topo da Tabela
            head.innerHTML = `
                <tr>
                    <th class="p-6 spec-col">Ficha Técnica</th>
                    ${ativos.map(p => `
                        <th class="p-6 device-data">
                            <span class="block text-emerald-400 text-[9px] font-bold uppercase mb-1">${p.phoneDetails?.brandValue || ''}</span>
                            <span class="font-black text-sm uppercase leading-tight">${p.phoneDetails?.modelValue || p.device_name}</span>
                        </th>
                    `).join('')}
                </tr>
            `;

            // Mapeamento Extenso de Especificações
            const specs = [
                { cat: 'Lançamento e Preço' },
                { label: 'Ano de Lançamento', val: p => p.phoneDetails?.yearValue },
                { label: 'Preço Médio (Est.)', val: p => p.gsmMiscDetails?.miscPrice || 'Consulte Varejo' },
                { label: 'Status', val: p => p.gsmLaunchDetails?.launchStatus },

                { cat: 'Desempenho' },
                { label: 'Chipset (CPU)', val: p => p.gsmPlatformDetails?.platformChipset },
                { label: 'Processador', val: p => p.gsmPlatformDetails?.platformCpu },
                { label: 'Placa de Vídeo (GPU)', val: p => p.gsmPlatformDetails?.platformGpu },
                { label: 'Memória Interna', val: p => p.gsmMemoryDetails?.memoryInternal },
                { label: 'RAM', val: p => p.gsmMemoryDetails?.memoryInternal?.split(' ')[1] || 'N/A' },

                { cat: 'Tela e Imagem' },
                { label: 'Tecnologia da Tela', val: p => p.gsmDisplayDetails?.displayType },
                { label: 'Tamanho (Pol.)', val: p => p.gsmDisplayDetails?.displaySize },
                { label: 'Resolução', val: p => p.gsmDisplayDetails?.displayResolution },
                { label: 'Proteção', val: p => p.gsmDisplayDetails?.displayProtection },

                { cat: 'Câmeras' },
                { label: 'Traseira Principal', val: p => p.gsmMainCameraDetails?.mainCameraQuad || p.gsmMainCameraDetails?.mainCameraTriple || p.gsmMainCameraDetails?.mainCameraSingle },
                { label: 'Vídeo (Max)', val: p => p.gsmMainCameraDetails?.mainCameraVideo },
                { label: 'Selfie Frontal', val: p => p.gsmSelfieCameraDetails?.selfieCameraSingle },

                { cat: 'Bateria e Extras' },
                { label: 'Capacidade Bateria', val: p => p.gsmBatteryDetails?.batteryType },
                { label: 'Carregamento', val: p => p.gsmBatteryDetails?.batteryCharging },
                { label: 'Sensores', val: p => p.gsmFeaturesDetails?.featuresOther1 || p.gsmFeaturesDetails?.featuresSensors },
                { label: 'Conectividade', val: p => p.gsmNetworkDetails?.networkSpeed },
                { label: 'Som Stereo', val: p => p.gsmSoundDetails?.soundLoudspeaker },
                { label: 'Entrada P2 (Fone)', val: p => p.gsmSoundDetails?.sound35MmJack }
            ];

            body.innerHTML = specs.map(s => {
                if (s.cat) return `<tr class="category-row"><td colspan="${ativos.length + 1}" class="p-3 text-center uppercase tracking-widest">${s.cat}</td></tr>`;
                return `
                    <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                        <td class="p-4 spec-col">${s.label}</td>
                        ${ativos.map(p => `<td class="p-4 device-data text-[11px] font-medium text-white/80">${s.val(p) || 'Não informado'}</td>`).join('')}
                    </tr>
                `;
            }).join('');
        }
    </script>
</body>
</html>
