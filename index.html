<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Spec - Automático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010c0a; color: white; overflow-x: hidden; }
        .aurora-bg { position: fixed; inset: 0; z-index: -1; }
        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.1; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .selected-card { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; }
        
        /* Estilo para a tabela em celulares */
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="aurora-bg">
        <div class="glow bg-emerald-500 w-[500px] h-[500px] -top-20 -left-20"></div>
        <div class="glow bg-teal-500 w-[400px] h-[400px] bottom-0 right-0"></div>
    </div>

    <header class="max-w-6xl mx-auto text-center mb-10">
        <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent italic">AURORA AUTO-COMPARE</h1>
        <p class="text-emerald-500/50 text-xs font-bold tracking-[0.3em] uppercase mt-2">Dados Globais em Tempo Real</p>
    </header>

    <main class="max-w-6xl mx-auto">
        <!-- BUSCA -->
        <div class="glass p-6 rounded-[2.5rem] mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="phoneInput" placeholder="Ex: iPhone 16 ou Galaxy S24..." 
                       class="flex-1 bg-white/5 border border-white/10 rounded-full px-6 py-4 outline-none focus:border-emerald-500 transition-all text-sm">
                <button onclick="searchPhones()" id="searchBtn" class="bg-emerald-500 text-black font-bold px-10 py-4 rounded-full hover:bg-emerald-400 transition-all text-sm">
                    PESQUISAR
                </button>
            </div>
        </div>

        <!-- LISTA DE RESULTADOS -->
        <div id="resultsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <!-- Cards de celulares aparecerão aqui -->
        </div>

        <!-- STATUS DE SELEÇÃO E BOTÃO COMPARAR -->
        <div id="selectionBar" class="hidden glass p-6 rounded-full mb-10 flex flex-col md:flex-row items-center justify-between gap-4 border-emerald-500/30">
            <span id="selectionText" class="text-emerald-400 font-bold text-sm italic">0 aparelhos selecionados (Mín. 2)</span>
            <button onclick="generateComparison()" id="compareBtn" disabled class="bg-emerald-500 disabled:bg-white/10 disabled:text-white/20 text-black px-10 py-3 rounded-full font-bold transition-all text-sm">
                COMPARAR AGORA
            </button>
        </div>

        <!-- TABELA DE COMPARAÇÃO -->
        <div id="comparisonArea" class="hidden mb-20">
            <div class="glass rounded-[2.5rem] overflow-hidden shadow-2xl">
                <div class="table-container overflow-x-auto">
                    <table class="w-full text-left min-w-[700px]">
                        <thead id="tableHead" class="border-b border-white/10"></thead>
                        <tbody id="tableBody" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
            <div class="text-center mt-6">
                <button onclick="location.reload()" class="text-emerald-500 underline text-xs font-bold uppercase tracking-widest">Limpar e Nova Busca</button>
            </div>
        </div>
    </main>

    <script>
        // --- COLOQUE SUA CHAVE AQUI ---
        const API_KEY = 'SUA_CHAVE_DO_RAPIDAPI_AQUI'; 
        // ------------------------------

        let selectedPhones = [];

        async function searchPhones() {
            const query = document.getElementById('phoneInput').value;
            const grid = document.getElementById('resultsGrid');
            if(!query) return;

            grid.innerHTML = '<div class="col-span-full text-center py-10 text-emerald-500 animate-pulse font-bold">Buscando na base de dados global...</div>';

            try {
                const response = await fetch(`https://mobile-phone-specs-database.p.rapidapi.com/gsm/search-query/${query}`, {
                    method: 'GET',
                    headers: {
                        'X-RapidAPI-Key': API_KEY,
                        'X-RapidAPI-Host': 'mobile-phone-specs-database.p.rapidapi.com'
                    }
                });
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                grid.innerHTML = '<div class="col-span-full text-red-400 text-center">Erro de conexão. Verifique sua chave API.</div>';
            }
        }

        function displayResults(data) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            
            data.forEach(item => {
                const card = document.createElement('div');
                card.id = `card-${item.slug}`;
                card.className = "glass p-4 rounded-3xl cursor-pointer hover:border-emerald-500/50 transition-all text-center group";
                card.innerHTML = `
                    <div class="w-full aspect-square bg-white/5 rounded-2xl mb-3 flex items-center justify-center border border-white/5 group-hover:bg-emerald-500/5">
                        <span class="text-[10px] text-white/20 uppercase font-bold tracking-tighter">Smartphone</span>
                    </div>
                    <p class="text-[10px] text-emerald-500 font-bold uppercase mb-1">${item.brand || 'Original'}</p>
                    <p class="text-xs font-bold leading-tight h-8 overflow-hidden">${item.device_name || item.title}</p>
                    <button onclick="selectPhone('${item.slug}')" class="mt-3 w-full bg-white/5 py-2 rounded-xl text-[10px] font-bold hover:bg-emerald-500 hover:text-black transition-all">SELECIONAR</button>
                `;
                grid.appendChild(card);
            });
        }

        async function selectPhone(slug) {
            // Se já estiver selecionado, remove
            if(selectedPhones.find(p => p.slug === slug)) {
                selectedPhones = selectedPhones.filter(p => p.slug !== slug);
                document.getElementById(`card-${slug}`).classList.remove('selected-card');
            } else {
                if(selectedPhones.length >= 4) return alert("Máximo 4 aparelhos!");
                
                // Busca detalhes antes de selecionar
                try {
                    const res = await fetch(`https://mobile-phone-specs-database.p.rapidapi.com/gsm/get-specifications-by-slug/${slug}`, {
                        method: 'GET',
                        headers: { 'X-RapidAPI-Key': API_KEY }
                    });
                    const specs = await res.json();
                    selectedPhones.push({slug, ...specs});
                    document.getElementById(`card-${slug}`).classList.add('selected-card');
                } catch(e) { alert("Erro ao carregar detalhes deste modelo."); }
            }
            updateSelectionBar();
        }

        function updateSelectionBar() {
            const bar = document.getElementById('selectionBar');
            const text = document.getElementById('selectionText');
            const btn = document.getElementById('compareBtn');

            if(selectedPhones.length > 0) bar.classList.remove('hidden');
            else bar.classList.add('hidden');

            text.innerText = `${selectedPhones.length} aparelhos selecionados ${selectedPhones.length < 2 ? '(Mínimo 2)' : ''}`;
            btn.disabled = selectedPhones.length < 2;
        }

        function generateComparison() {
            document.getElementById('comparisonArea').classList.remove('hidden');
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            // Criar Cabeçalho
            head.innerHTML = `
                <tr>
                    <th class="p-6 text-emerald-500 text-xs font-black uppercase italic">Especificação</th>
                    ${selectedPhones.map(p => `<th class="p-6 text-center border-l border-white/5">${p.device_name}</th>`).join('')}
                </tr>
            `;

            // Mapear campos da API para nomes bonitos
            const rows = [
                { label: 'Processador (CPU)', key: 'cpu' },
                { label: 'Chipset', key: 'chipset' },
                { label: 'Memória RAM', key: 'internal' },
                { label: 'Câmera Principal', key: 'main_camera_single' },
                { label: 'Câmera Frontal', key: 'selfie_camera_single' },
                { label: 'Bateria', key: 'battery_type' },
                { label: 'Tela', key: 'display_type' },
                { label: 'Resolução', key: 'display_resolution' }
            ];

            body.innerHTML = rows.map((row, index) => `
                <tr class="border-b border-white/5 ${index % 2 === 0 ? '' : 'bg-white/5'}">
                    <td class="p-4 text-emerald-400/70 font-bold text-[10px] uppercase">${row.label}</td>
                    ${selectedPhones.map(p => `<td class="p-4 text-center border-l border-white/5 text-xs">${p[row.key] || 'Informação não disponível'}</td>`).join('')}
                </tr>
            `).join('');

            window.scrollTo({ top: document.getElementById('comparisonArea').offsetTop - 50, behavior: 'smooth' });
        }
    </script>
</body>
</html>
